    {
      "title": "الأصل الحادي عشر: الأصل في العبادات التوقيف، وفي العادات الإباحة",
      "content": "<p><strong>الفقرة (القاعدة):</strong><br/>في العبادات: لا يجوز أن نخترع عبادة جديدة (بدعة) لم ترد في الكتاب والسنة. العبادات توقيفية، أي أننا نقف عند حدود ما شرع الله. في العادات والمعاملات الدنيوية: الأصل فيها الإباحة، فكل شيء حلال حتى يرد دليل على تحريمه. هذا أصل يضبط علاقة المسلم بالحياة.</p><p><strong>الدليل:</strong><br/>قال النبي ﷺ: «مَنْ عَمِلَ عَمَلًا لَيْسَ عَلَيْهِ أَمْرُنَا فَهُوَ رَدٌّ» (رواه مسلم، رقم 1718). وفي العادات: قال تعالى: ﴿هُوَ الَّذِي خَلَقَ لَكُمْ مَا فِي الْأَرْضِ جَمِيعًا﴾ [البقرة: 29]، فالأصل في الأشياء أنها مسخرة لنا.</p><p><strong>الشرح المختصر:</strong><br/>لا يجوز اختراع صلاة سادسة، أو صيام شهر زائد عن رمضان بنية التعبد. أما التقنيات الحديثة، والأطعمة الجديدة، وألعاب الفيديو، فالأصل أنها مباحة، ما لم تشتمل على محرم (كالموسيقى الفاجرة، أو المقامرة، أو تضييع الصلاة). بعض التنويريين يعكسون الآية: يحاولون تغيير العبادات (يقولون الصلاة خمس مرات ليست فرضاً!)، وهذا كفر.</p><p><strong>نموذج تطبيقي (الرد على شبهة):</strong><br/>الشبهة: \"لماذا تمنعون الاحتفال بالمولد النبوي؟ إنه تكريم للنبي\".<br/>الرد بالقاعدة: لأن الاحتفال بالمولد عبادة. والعبادات توقيفية. لم يفعله النبي ﷺ، ولا أصحابه، ولا الأئمة الأربعة. تكريم النبي يكون باتباع سنته، لا باختراع عيد لم يشرعه الله. أما العادات كتوزيع الحلوى في أي يوم، فلا بأس به ما لم يُعتقد أنه عبادة. بهذا نضبط الأمور.</p><p><strong>الفائدة التربوية:</strong><br/>أنت في المدرسة تتعلم علوم العادات (رياضيات، فيزياء) وكلها مباحة ومطلوبة. وفي المسجد تتعلم العبادات كما علمنا النبي. لا تخلط بين هذا وذاك. العبادة تحتاج إلى دليل، والعادة لا تحتاج إلى دليل حتى يرد المنع.</p>"
    },
    {
      "title": "الأصل الثاني عشر: التدرج في التعلم والعمل",
      "content": "<p><strong>الفقرة (القاعدة):</strong><br/>الدين لم ينزل جملة واحدة، بل نزل منجماً بحسب الوقائع. والمسلم يتعلم دينه بالتدرج، فيبدأ بالأهم فالمهم. وكذلك في تربية النفس وترك المعاصي يكون التدرج. هذا الأصل يمنع اليأس والغلو. قال جندب بن عبد الله: \"تعلمنا الإيمان قبل القرآن\".</p><p><strong>الدليل:</strong><br/>قال تعالى: ﴿وَقُرْآنًا فَرَقْنَاهُ لِتَقْرَأَهُ عَلَى النَّاسِ عَلَىٰ مُكْثٍ وَنَزَّلْنَاهُ تَنْزِيلًا﴾ [الإسراء: 106]. وعن عائشة رضي الله عنها: «إِنَّمَا نَزَلَ أَوَّلَ مَا نَزَلَ مِنْهُ سُورَةٌ مِنَ المُفَصَّلِ فِيهَا ذِكْرُ الجَنَّةِ وَالنَّارِ، حَتَّى إِذَا ثَابَ النَّاسُ إِلَى الإِسْلاَمِ نَزَلَ الحَلاَلُ وَالحَرَامُ» (رواه البخاري، رقم 4993).</p><p><strong>الشرح المختصر:</strong><br/>لا تطلب من نفسك أن تكون عالماً في يوم وليلة. ابدأ بحفظ القرآن والسنة الأساسية، ثم تعلم الفقه، وهكذا. وإذا أردت أن تترك ذنباً اعتدته، فافعل ذلك تدريجياً مع الاستعانة بالله. خالف الهوى خطوة خطوة. الصحابة تربوا على هذا.</p><p><strong>نموذج تطبيقي (الرد على شبهة):</strong><br/>الشبهة: شاب يقول: \"أريد أن أتقرب إلى الله، فقررت أن أصوم الدهر كله، وأقوم الليل كله!\". بعد أسبوع يمرض ويفشل ويقول: \"الدين صعب!\".<br/>الرد بالقاعدة: هذا غلو وترك للتدرج. النبي ﷺ قال: «إِنَّ الدِّينَ يُسْرٌ، وَلَنْ يُشَادَّ الدِّينَ أَحَدٌ إِلَّا غَلَبَهُ» (رواه البخاري، رقم 39). ابدأ بصيام الإثنين والخميس، وقيام ركعات قليلة، واستمر. القليل الدائم خير من الكثير المنقطع.</p><p><strong>الفائدة التربوية:</strong><br/>رتب أولوياتك العلمية. لا تحاول أن تحفظ كل شيء دفعة واحدة. ضع جدولاً لتحفيظ القرآن مثلاً (آية آية)، ولقراءة كتب الفقه (باباً باباً). هكذا بنى السلف علمهم الراسخ.</p>"

    {
      "title": "خاتمة الكراسة",
      "content": "<p>الحمد لله الذي بنعمته تتم الصالحات.</p><p>يا بني ويا بنتي، لقد تعلمنا اثني عشر أصلاً من أصول الفهم السديد. هذه الأصول ليست مجرد معلومات، بل هي درعك وسيفك في هذا الزمن المتلاطم بالأفكار. احفظها، وتأملها، وطبقها في كل ما يمر عليك. إذا جاءتك شبهة، فأرجعها إلى هذه الأصول، وستجد بإذن الله مخرجاً.</p><p><strong>وصية أخيرة:</strong><br/>قال عمر بن الخطاب رضي الله عنه: \"إنما تنقض عرى الإسلام عروة عروة إذا نشأ في الإسلام من لا يعرف الجاهلية\". أي من يقرأ القرآن ولا يفهمه بفهم الصحابة. فاجتهد أن تكون من الراسخين في العلم، الذين يميزون الحق من الباطل بالفهم السديد. ولا تنسَ الدعاء: \"اللهم أرنا الحق حقاً وارزقنا اتباعه، وأرنا الباطل باطلاً وارزقنا اجتنابه\".</p><p>انتهت كراسة \"أصول الفهم السديد\" بحمد الله ومنه.</p>"

      "content": "<table border='1'><tr><th>الرقم</th><th>الأصل</th></tr><tr><td>1</td><td>الكتاب والسنة هما المصدران الوحيدان، لا نأخذ الدين من غيرهما.</td></tr><tr><td>2</td><td>فهم السلف هو الميزان، لا نقبل فهماً جديداً يخالف الصحابة.</td></tr><tr><td>3</td><td>رد المتشابه إلى المحكم، ولا نتبع ما تشابه من النصوص بلا علم.</td></tr><tr><td>4</td><td>النصوص لا تتناقض، والواجب الجمع بينها، لا رفض بعضها.</td></tr><tr><td>5</td><td>العقل الصريح لا يخالف النقل الصحيح، والعقل السليم يشهد للوحي.</td></tr><tr><td>6</td><td>إجماع الأمة حجة، ومن شذ عنهم شذ.</td></tr><tr><td>7</td><td>القطعيات لا تقبل التأويل (مثل أركان الإسلام).</td></tr><tr><td>8</td><td>مراعاة المآلات، فالفعل المباح قد يُمنع إذا أدى إلى مفسدة.</td></tr><tr><td>9</td><td>ربط الفروع بالأصول، فكل حكم يخدم التوحيد والأخلاق.</td></tr><tr><td>10</td><td>التثبت والورع، فلا تتكلم في الدين بغير علم.</td></tr><tr><td>11</td><td>العبادات توقيفية لا نخترع فيها، والعادات إباحية حتى يرد المنع.</td></tr><tr><td>12</td><td>التدرج في التعلم والعمل، فلا غلو ولا تفريط.</td></tr></table><p>بهذا اكتملت الكراسة المطلوبة، وهي جاهزة للطباعة والتعليم، نسأل الله أن ينفع بها، ويجعلها حصناً فكرياً لشبابنا. وصلى الله على نبينا محمد.</p>"

      "content": "<p>بسم الله الرحمن الرحيم</p><p>الحمد لله الذي أكمل لنا الدين، وأتم علينا النعمة، وجعل أخلاق الإسلام نبراساً للعالمين. والصلاة والسلام على سيد الأولين والآخرين، الذي قال الله عنه: ﴿وَإِنَّكَ لَعَلَىٰ خُلُقٍ عَظِيمٍ﴾ [القلم: 4]، وعلى آله وصحبه أجمعين.</p><p>يا بني ويا بنتي، أهلاً بك في كراسة \"هذه أخلاقي\". بعد أن تعلمت العقيدة الصحيحة في \"أركان الإيمان\"، والأحكام العملية في \"النور المبين\"، وسيرة الحبيب في \"مع الحبيب\"، وقواعد الفهم السليم في \"أصول الفهم السديد\"، حان الوقت لنرتقي بأنفسنا ونسمو بأخلاقنا. فالإيمان ليس مجرد كلمات تقال، بل هو سلوك وأخلاق تظهر في تعاملنا اليومي. قال النبي ﷺ: «إِنَّمَا بُعِثْتُ لِأُتَمِّمَ صَالِحَ الْأَخْلَاقِ» (رواه البخاري في الأدب المفرد، وصححه الألباني، رقم 273).</p><p>في هذه الكراسة، سنتعلم الأخلاق الإسلامية بأسلوب واحد محبوب: فقرة، دليل، شرح مختصر، نموذج تطبيقي، ثم فائدة تربوية. لتكون أخلاقك مرآة تعكس نور الإيمان في قلبك.</p>"
    },
    {
      "title": "الدرس الأول: آداب النوم والاستيقاظ",
      "content": "<p><strong>الفقرة الأساسية:</strong> من آداب النوم: النوم على طهارة، نفض الفراش ثلاثاً، النوم على الشق الأيمن، وضع اليد اليمنى تحت الخد، قراءة المعوذات (الإخلاص والفلق والناس) والنفث في الكفين ثلاثاً، وختم الأذكار بقول: \"باسمك اللهم أموت وأحيا\". ومن آداب الاستيقاظ: مسح أثر النوم عن الوجه باليدين، وقول: \"الحمد لله الذي أحيانا بعد ما أماتنا وإليه النشور\".</p><p><strong>الدليل:</strong> قال النبي ﷺ: «إِذَا أَوَيْتَ إِلَى فِرَاشِكَ فَتَوَضَّأْ وُضُوءَكَ لِلصَّلاَةِ، ثُمَّ اضْطَجِعْ عَلَى شِقِّكَ الأَيْمَنِ...» (رواه البخاري، رقم 247، ومسلم، رقم 2710).</p><p><strong>الشرح المختصر:</strong> النوم ليس مجرد راحة للجسد، بل هو عبادة عظيمة إذا أديتها على السنة. التوضؤ قبل النوم يجعلك طاهراً طوال الليل. النوم على الجانب الأيمن هو الأصح للجسم، وفيه اتباع للنبي ﷺ. الأذكار قبل النوم تحميك من الشيطان وتجعل الملائكة تحرسك، والأذكار عند الاستيقاظ هي أول كلمات تخرج من فمك شكراً لله على نعمة الحياة الجديدة.</p><p><strong>النموذج التطبيقي:</strong> قبل أن تذهب إلى فراشك الليلة، افعل هذه الخطوات بالترتيب: 1- توضأ وضوءاً خفيفاً. 2- انفض فراشك بطرف إزارك قائلاً: \"بسم الله\". 3- اقرأ الإخلاص والفلق والناس ثلاثاً، واجمع كفيك وانفث فيهما، وامسح بهما ما استطعت من جسدك. 4- استلقِ على جنبك الأيمن، وضع خدك الأيمن على يدك اليمنى. 5- قل: \"باسمك اللهم أموت وأحيا\". 6- إذا استيقظت فقل فوراً: \"الحمد لله الذي أحيانا بعد ما أماتنا وإليه النشور\".</p><p><strong>الفائدة التربوية:</strong> عندما تنام على هذه الطريقة، فأنت تختم يومك بأجمل خاتمة: طهارة وذكر لله. وإذا قبض الله روحك في نومك، فأنت على طهارة وذكر. قال بعض العلماء: \"المرء يبعث على ما مات عليه\"، فأحبب أن يكون آخر كلامك ذكر الله.</p>"
    },
    {
      "title": "الدرس الثاني: آداب الطعام والشراب",
      "content": "<p><strong>الفقرة الأساسية:</strong> للطعام آداب عظيمة علمنا إياها النبي ﷺ: 1- غسل اليدين قبل الطعام وبعده. 2- التسمية في أوله: \"بسم الله\". 3- الأكل باليد اليمنى. 4- الأكل مما يليك مباشرة. 5- الأكل بثلاث أصابع ولعقها بعد الطعام. 6- عدم عيب الطعام أو التقزز منه. 7- حمد الله بعد الفراغ: \"الحمد لله الذي أطعمني هذا ورزقنيه من غير حول مني ولا قوة\". 8- عدم الأكل متكئاً (مستلقياً) إلا لحاجة.</p><p><strong>الدليل:</strong> قال النبي ﷺ لعمرو بن أبي سلمة رضي الله عنه وكان غلاماً صغيراً: «يَا غُلاَمُ، سَمِّ اللَّهَ، وَكُلْ بِيَمِينِكَ، وَكُلْ مِمَّا يَلِيكَ» (رواه البخاري، رقم 5376، ومسلم، رقم 2022).</p><p><strong>الشرح المختصر:</strong> هذه الآداب تجعل الأكل عبادة تؤجر عليها. البدء بـ \"بسم الله\" يطرد الشيطان ويبارك في الطعام. الأكل باليمين مخالفة للشيطان الذي يأكل ويشرب بشماله. الأكل مما يليك أدب رفيع مع الجلساء. إذا نسيت التسمية في أوله فقل: \"بسم الله أوله وآخره\". ولا تنس أن تجلس معتدلاً لا متكئاً، فإن النبي ﷺ كان لا يأكل متكئاً تواضعاً لله.</p><p><strong>النموذج التطبيقي:</strong> اجلس إلى المائدة اليوم مع أهلك، وطبق هذه الآداب عملياً: 1- اغسل يديك. 2- اجلس معتدلاً. 3- قل: \"بسم الله\". 4- كل بيمينك. 5- كل مما يليك، ولا تمد يدك إلى طرف الصحن الآخر. 6- إذا انتهيت، العق أصابعك (فإن البركة لا تدري في أي الطعام تكون). 7- قل: \"الحمد لله\". لاحظ كيف سينظر إليك أهلك بإعجاب وأنت تتأدب بأدب النبي ﷺ!</p><p><strong>الفائدة التربوية:</strong> الطعام نعمة، وأدب الطعام شكر لهذه النعمة. هل تعلم أن لعق الأصابع والصحن من أسباب البركة؟ قال النبي ﷺ: «إِنَّكُمْ لاَ تَدْرُونَ فِي أَيِّهِ الْبَرَكَةُ» (رواه مسلم، رقم 2033). فلا تستحِ من تطبيق سنة النبي ﷺ، فبركتها عظيمة.</p>"
    },
    {
      "title": "الدرس الثالث: آداب اللباس والزينة",
      "content": "<p><strong>الفقرة الأساسية:</strong> من آداب اللباس: 1- التسمية عند اللبس: \"بسم الله\". 2- البدء باليمين عند لبس الثوب والنعل، وبالشمال عند الخلع. 3- الدعاء بالمأثور عند لبس الجديد: \"اللهم لك الحمد أنت كسوتنيه...\". 4- ألا يكون اللباس للشهرة أو الخيلاء. 5- أن يكون ساتراً للعورة، واسعاً فضفاضاً غير شفاف. 6- ألا يكون فيه تشبه بالكفار أو الجنس الآخر. 7- للنساء: الحجاب الكامل أمام الرجال الأجانب.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «إِذَا لَبِسْتَ ثَوْبًا فَقُلِ: الْحَمْدُ لِلَّهِ الَّذِي كَسَانِي هَذَا الثَّوْبَ وَرَزَقَنِيهِ مِنْ غَيْرِ حَوْلٍ مِنِّي وَلاَ قُوَّةٍ» (رواه الترمذي، رقم 3448، وحسنه الألباني). وقال: «مَنْ لَبِسَ ثَوْبَ شُهْرَةٍ فِي الدُّنْيَا أَلْبَسَهُ اللَّهُ ثَوْبَ مَذَلَّةٍ يَوْمَ الْقِيَامَةِ» (رواه أحمد وأبو داود، وحسنه الألباني).</p><p><strong>الشرح المختصر:</strong> اللباس نعمة من الله تستوجب الشكر، والشكر يكون بالدعاء المأثور أولاً، وباستخدام النعمة فيما يرضي الله ثانياً. لباس الشهرة هو ما يقصد به التميز عن الناس والتعالي عليهم، وهو محرم. تشبه الرجال بالنساء والعكس من الكبائر، لأن فيه تغييراً لخلق الله وخروجاً عن الفطرة.</p><p><strong>النموذج التطبيقي:</strong> عندما ترتدي ملابسك صباحاً: 1- قل: \"بسم الله\". 2- ابدأ بلبس الكم الأيمن ثم الأيسر. 3- قل الدعاء المأثور. 4- انظر في المرآة وقل: \"اللهم كما حسّنت خَلقي فحسّن خُلُقي\". 5- اسأل نفسك: هل هذا اللباس يرضي الله؟ هل هو ساتر؟ هل فيه تشبه بغير المسلمين في خاصة لباسهم؟ إن كان كذلك فغيره.</p><p><strong>الفائدة التربوية:</strong> أناقة الظاهر مع الإيمان تجعلك محبوباً عند الله وعند الناس. قال النبي ﷺ: «إِنَّ اللَّهَ جَمِيلٌ يُحِبُّ الْجَمَالَ» (رواه مسلم، رقم 91). فكن جميلاً في لباسك، وجميلاً في أخلاقك، تكن من أحباب الله.</p>"

    {
      "title": "الدرس الرابع: آداب قضاء الحاجة",
      "content": "<p><strong>الفقرة الأساسية:</strong> لقضاء الحاجة آداب عظيمة تدل على طهارة المسلم ونظافته: 1- الدعاء عند الدخول: \"بسم الله، اللهم إني أعوذ بك من الخبث والخبائث\". 2- الدخول بالرجل اليسرى. 3- عدم استقبال القبلة أو استدبارها في الفضاء. 4- الاستتار عن أعين الناس. 5- عدم الكلام أثناء قضاء الحاجة. 6- الاستنجاء باليد اليسرى (بالماء أو الحجر). 7- الخروج بالرجل اليمنى، وقول: \"غفرانك\".</p><p><strong>الدليل:</strong> قالت عائشة رضي الله عنها: «كَانَ النَّبِيُّ ﷺ إِذَا خَرَجَ مِنَ الْغَائِطِ قَالَ: غُفْرَانَكَ» (رواه الترمذي، رقم 7، وصححه الألباني).</p><p><strong>الشرح المختصر:</strong> هذه الآداب تجعل المسلم في حصن من الشيطان حتى في هذه اللحظة. قول \"بسم الله\" يستر عورتك عن أعين الجن. والتعوذ من \"الخبث والخبائث\" أي ذكور الشياطين وإناثهم. وقول \"غفرانك\" بعد الخروج هو استغفار لله عن التقصير في ذكره أثناء هذه الفترة، فكأن العبد يعتذر لربه عن انقطاعه عن الذكر.</p><p><strong>النموذج التطبيقي:</strong> اجعل لك في هاتفك أو على باب دورة المياه لافتة صغيرة مكتوباً عليها أدعية الدخول والخروج. كلما دخلت: 1- قل الدعاء كاملاً. 2- ادخل برجلك اليسرى. 3- لا تتحدث مع أحد ولا ترد على الهاتف. 4- استنجِ بيدك اليسرى. 5- اخرج برجلك اليمنى قائلاً: \"غفرانك\". ستجد أن هذا الروتين يعلمك النظام والطهارة في كل لحظة.</p><p><strong>الفائدة التربوية:</strong> الإسلام دين النظافة والطهارة في كل شيء. حتى في أخس اللحظات، أنت في حماية الله وذكره. تعلم من هذا أن المؤمن لا ينقطع عن ربه أبداً، وقلبه معلق بالله في كل حال.</p>"

    {
      "title": "الدرس الخامس: الصدق واجتناب الكذب",
      "content": "<p><strong>الفقرة الأساسية:</strong> الصدق هو أساس كل خير، والكذب أساس كل شر. يجب على المسلم أن يكون صادقاً في أقواله وأفعاله. الصدق يهدي إلى البر، والبر يهدي إلى الجنة. والكذب يهدي إلى الفجور، والفجور يهدي إلى النار. لا يحل الكذب إلا في ثلاث حالات استثنائية: في الحرب، والإصلاح بين الناس، وحديث الرجل لزوجته والعكس.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «عَلَيْكُمْ بِالصِّدْقِ، فَإِنَّ الصِّدْقَ يَهْدِي إِلَى الْبِرِّ، وَإِنَّ الْبِرَّ يَهْدِي إِلَى الْجَنَّةِ. وَمَا يَزَالُ الرَّجُلُ يَصْدُقُ وَيَتَحَرَّى الصِّدْقَ حَتَّى يُكْتَبَ عِنْدَ اللَّهِ صِدِّيقًا. وَإِيَّاكُمْ وَالْكَذِبَ، فَإِنَّ الْكَذِبَ يَهْدِي إِلَى الْفُجُورِ، وَإِنَّ الْفُجُورَ يَهْدِي إِلَى النَّارِ...» (رواه البخاري، رقم 6094، ومسلم، رقم 2607).</p><p><strong>الشرح المختصر:</strong> انظر كيف أن الصدق طريق إلى الجنة، والكذب طريق إلى النار. \"الصدّيق\" هي مرتبة عظيمة بعد الأنبياء، ينالها بالصدق المستمر. ليس هناك \"كذبة بيضاء\" كما يسمونها! كل كذب محرم، إلا ما استثناه الشرع. وحتى المزاح لا يجوز فيه الكذب، قال النبي ﷺ: «وَيْلٌ لِلَّذِي يُحَدِّثُ بِالْحَدِيثِ لِيُضْحِكَ بِهِ الْقَوْمَ فَيَكْذِبُ» (رواه أبو داود، رقم 4990، وحسنه الألباني).</p><p><strong>النموذج التطبيقي:</strong> لنفترض أن صديقك سألك: \"هل أنهيت واجبك؟\" وأنت لم تنهِه. بدل أن تكذب وتقول: \"نعم\"، قل: \"لا، لم أنهِه بعد، وسأعمل عليه الآن\". أو إذا أخطأت وكسرت شيئاً في البيت، فلا تكذب وتنكر، بل قل: \"أنا آسف، أنا الذي كسرته\". صدقني، والديك سيحبانك أكثر لأنك صادق، حتى لو غضبا قليلاً. الصدق منجاة وصاحبه محترم دائماً.</p><p><strong>الفائدة التربوية:</strong> تدرب على الصدق لمدة أسبوع كامل، في كل كلمة تقولها. ستشعر براحة عظيمة، لأنك لست مضطراً لتذكر كذباتك، فالصادق لا يحتاج لذاكرة قوية! قال عمر بن الخطاب رضي الله عنه: \"عليك بالصدق وإن قتلك\".</p>"
    },
    {
      "title": "الدرس السادس: الأمانة وأداء الحقوق",
      "content": "<p><strong>الفقرة الأساسية:</strong> الأمانة من أعظم أخلاق الإسلام. وتشمل: حفظ الأسرار، ورد الودائع، وإتقان العمل، وأداء الحقوق لأهلها، والوفاء بالعهد. والأمانة ضد الخيانة، والخيانة من صفات المنافقين. كل ما أنت مؤتمن عليه يجب أن تحفظه: ممتلكات المدرسة، أسرار صديقك، أموال والديك.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «أَرْبَعٌ مَنْ كُنَّ فِيهِ كَانَ مُنَافِقًا خَالِصًا، وَمَنْ كَانَتْ فِيهِ خَصْلَةٌ مِنْهُنَّ كَانَتْ فِيهِ خَصْلَةٌ مِنَ النِّفَاقِ حَتَّى يَدَعَهَا: إِذَا اؤْتُمِنَ خَانَ، وَإِذَا حَدَّثَ كَذَبَ، وَإِذَا عَاهَدَ غَدَرَ، وَإِذَا خَاصَمَ فَجَرَ» (رواه البخاري، رقم 34، ومسلم، رقم 58).</p><p><strong>الشرح المختصر:</strong> انظر كيف جعل النبي ﷺ خيانة الأمانة علامة من علامات النفاق! الأمانة ليست فقط في المال، بل في كل شيء. المعلم ائتمنك على القسم، فلا تخربه. صديقك ائتمنك على سره، فلا تفشه. والديك ائتمناك على أخيك الصغير، فاحفظه. الوطن ائتمنك على مرافقه، فلا تخربها.</p><p><strong>النموذج التطبيقي:</strong> 1- إذا أعطاك صديقك قلماً وأخذته منه، فرده له في نهاية الحصة ولا تؤجله. 2- إذا حدثك صديق بسر وقال: \"هذا بيني وبينك\"، فلا تخبر به أحداً أبداً، حتى لو اختلفتما. 3- إذا طلب منك والدك أن توصل رسالة أو تفعل شيئاً، فأتقنه ولا تتهاون فيه. 4- في الامتحان، لا تغش، فالغش خيانة للأمانة.</p><p><strong>الفائدة التربوية:</strong> الأمانة تجعلك محبوباً موثوقاً عند الله وعند الناس. الناس يأتمنون الأمين على أموالهم وأسرارهم وأعراضهم. كن كالصحابي الجليل أبي عبيدة بن الجراح رضي الله عنه الذي لقبه النبي ﷺ: «أَمِينُ هَذِهِ الأُمَّةِ» (رواه البخاري، رقم 4382، ومسلم، رقم 2419). ألا تحب أن تكون أميناً في قومك؟</p>"
    },
    {
      "title": "الدرس السابع: الحياء",
      "content": "<p><strong>الفقرة الأساسية:</strong> الحياء خلق إسلامي عظيم، وهو رأس مكارم الأخلاق. الحياء هو خلق يبعث على فعل الجميل وترك القبيح. والحياء نوعان: حياء فطري يولد مع الإنسان، وحياء مكتسب من معرفة الله ومراقبته. والحياء شعبة من شعب الإيمان، والحياء كله خير ولا يأتي إلا بخير.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «الْحَيَاءُ لاَ يَأْتِي إِلَّا بِخَيْرٍ» (رواه البخاري، رقم 6117، ومسلم، رقم 37). وقال: «إِنَّ مِمَّا أَدْرَكَ النَّاسُ مِنْ كَلاَمِ النُّبُوَّةِ الأُولَى: إِذَا لَمْ تَسْتَحْيِ فَاصْنَعْ مَا شِئْتَ» (رواه البخاري، رقم 6120).</p><p><strong>الشرح المختصر:</strong> الحياء ليس ضعفاً كما يظن البعض، بل هو قوة في الإيمان. تستحي أن يراك الله حيث نهاك، وتستحي أن تقول كلمة بذيئة أمام الناس، وتستحي أن تكشف عورتك، وتستحي أن ترفع صوتك على والديك. وقوله: \"إذا لم تستحِ فاصنع ما شئت\" معناه أن من لا حياء له، لا رادع له، فسيفعل كل قبيح. فالحياة بلا حياء موت للضمير.</p><p><strong>النموذج التطبيقي:</strong> لنفترض أن أصدقاءك في المدرسة بدؤوا يتكلمون بكلام بذيء أو نكات غير لائقة. بدل أن تضحك معهم وتشاركهم، قل لهم بهدوء وأدب: \"يا جماعة، هذا الكلام لا يليق بنا كمسلمين، فلنغير الموضوع\". أو ببساطة، انصرف عنهم. هذا هو الحياء العملي، الذي يحميك ويدعو للخير.</p><p><strong>الفائدة التربوية:</strong> تذكر أن الله يراك في كل لحظة. الحياء من الله أن تحفظ رأسك وما وعى، وبطنك وما حوى. الحياء يجعل الفتاة تلتزم بحجابها وعفتها، ويجعل الشاب يغض بصره ويحفظ نفسه. قال الله تعالى: ﴿أَلَمْ يَعْلَمْ بِأَنَّ اللَّهَ يَرَىٰ﴾ [العلق: 14]. استحِ من الله، فهو أحق أن تستحي منه.</p>"
    },
    {
      "title": "الدرس الثامن: العفة وغض البصر",
      "content": "<p><strong>الفقرة الأساسية:</strong> العفة هي الكف عن الحرام، وغض البصر من أعظم وسائلها. أمر الله المؤمنين والمؤمنات بغض الأبصار وحفظ الفروج. فالنظرة سهم مسموم من سهام إبليس، تزرع في القلب شهوة، وقد تجر إلى فواحش. والعفيف المحظوظ هو الذي يمنع نفسه عن الحرام رغم قدرته عليه.</p><p><strong>الدليل:</strong> قال تعالى: ﴿قُلْ لِلْمُؤْمِنِينَ يَغُضُّوا مِنْ أَبْصَارِهِمْ وَيَحْفَظُوا فُرُوجَهُمْ ۚ ذَٰلِكَ أَزْكَىٰ لَهُمْ ۗ إِنَّ اللَّهَ خَبِيرٌ بِمَا يَصْنَعُونَ * وَقُلْ لِلْمُؤْمِنَاتِ يَغْضُضْنَ مِنْ أَبْصَارِهِنَّ وَيَحْفَظْنَ فُرُوجَهُنَّ...﴾ [النور: 30-31].</p><p><strong>الشرح المختصر:</strong> \"غض البصر\" ليس معناه إغماض العين بالكلية، بل هو صرف النظر فوراً عن الحرام، وعدم إطالة النظر أو تكراره. الآية تقول: \"ذلك أزكى لهم\"، أي أطهر لقلوبهم وأنقى. العفة ليست للكبار فقط، بل تبدأ من سنكم، بتدريب النفس على غض البصر، وتجنب الصور والمقاطع المحرمة في الهاتف، وعدم الخلوة بمن لا يحل لك.</p><p><strong>النموذج التطبيقي:</strong> 1- إذا كنت تمشي في الشارع أو في المدرسة ووقع بصرك على منظر محرم، فاصرف بصرك فوراً إلى جهة أخرى. لا تقل: \"نظرة واحدة لا تضر\"، فالنظرة تلو النظرة تجر. 2- في هاتفك، احذف أي تطبيق أو قناة تظهر لك صوراً فاتنة أو محرمة. وإذا ظهرت صورة محرمة فجأة، فاصرف النظر وأغلق الصفحة. 3- قل في نفسك: \"الله يراني، وسيسألني عن نظري\".</p><p><strong>الفائدة التربوية:</strong> غض البصر راحة للقلب. جرب أن تغض بصرك عن المحرمات لمدة أسبوع، وستجد أن قلبك أصبح أنقى، وصلاتك أخشع. من ترك شيئاً لله عوضه الله خيراً منه. قال النبي ﷺ: «النَّظْرَةُ سَهْمٌ مِنْ سِهَامِ إِبْلِيسَ مَسْمُومَةٌ، فَمَنْ تَرَكَهَا مَخَافَتِي أَبْدَلْتُهُ إِيمَانًا يَجِدُ حَلاَوَتَهُ فِي قَلْبِهِ» (رواه الحاكم وصححه الألباني في صحيح الجامع، رقم 6807).</p>"
    },
    {
      "title": "الدرس التاسع: بر الوالدين",
      "content": "<p><strong>الفقرة الأساسية:</strong> بر الوالدين واجب، وهو من أفضل القربات إلى الله بعد التوحيد. البر يكون بالطاعة في المعروف، وخفض الصوت، وعدم التأفف، والخدمة بلا منّة، والإنفاق عليهما عند الحاجة، والاستغفار لهما، وصلة أصدقائهما بعد موتهما. ولا تجوز معصية الوالدين إلا إذا أمرا بشرك أو معصية، فيطاعان في غير معصية الخالق.</p><p><strong>الدليل:</strong> قال الله تعالى: ﴿وَقَضَىٰ رَبُّكَ أَلَّا تَعْبُدُوا إِلَّا إِيَّاهُ وَبِالْوَالِدَيْنِ إِحْسَانًا ۚ إِمَّا يَبْلُغَنَّ عِنْدَكَ الْكِبَرَ أَحَدُهُمَا أَوْ كِلَاهُمَا فَلَا تَقُلْ لَهُمَا أُفٍّ وَلَا تَنْهَرْهُمَا وَقُلْ لَهُمَا قَوْلًا كَرِيمًا * وَاخْفِضْ لَهُمَا جَنَاحَ الذُّلِّ مِنَ الرَّحْمَةِ وَقُلْ رَبِّ ارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا﴾ [الإسراء: 23-24].</p><p><strong>الشرح المختصر:</strong> تأمل قوله: \"ولا تقل لهما أفٍّ\"! \"أف\" كلمة صغيرة جداً تقال عند الضجر، فإذا كان الله نهى عنها، فكيف بالصراخ أو السب أو الهجر؟ \"واخفض لهما جناح الذل من الرحمة\" أي تواضع لهما من رحمتك بهما. وتذكر أنهما تعبا في تربيتك صغيراً، فالآن جاء دور البر والمكافأة.</p><p><strong>النموذج التطبيقي:</strong> 1- إذا نادتك أمك وأنت في غرفتك، أجب فوراً بصوت لطيف: \"نعم يا أمي، أنا قادم\"، ولا تتأخر. 2- إذا طلب والدك كوب ماء، فأسرع به مبتسماً وقبّل رأسه. 3- إذا احتاجا إلى مساعدة في البيت، بادر أنت دون أن يطلبا: نظف، رتب، ساعد في إعداد الطعام. 4- كل يوم قبل النوم، قل: \"اللهم اغفر لي ولوالديّ\".</p><p><strong>الفائدة التربوية:</strong> بر الوالدين يفتح لك أبواب الخير كلها. قال النبي ﷺ: «رِضَا الرَّبِّ فِي رِضَا الْوَالِدِ، وَسَخَطُ الرَّبِّ فِي سَخَطِ الْوَالِدِ» (رواه الترمذي، رقم 1899، وصححه الألباني). فإذا أردت أن يرضى الله عنك، فأرضِ والديك.</p>"
    },
    {
      "title": "الدرس العاشر: صلة الرحم",
      "content": "<p><strong>الفقرة الأساسية:</strong> الأرحام هم أقاربك من جهة الأب والأم (الأعمام، الأخوال، أبناؤهم...). وصلتهم واجبة، وقطيعتهم من الكبائر. صلة الرحم تكون بالزيارة، والسؤال عنهم، والهدية، والدعاء لهم، والمشاركة في أفراحهم وأتراحهم. ولا يشترط أن يبادلوك الوصل.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «الرَّحِمُ مُعَلَّقَةٌ بِالْعَرْشِ، تَقُولُ: مَنْ وَصَلَنِي وَصَلَهُ اللَّهُ، وَمَنْ قَطَعَنِي قَطَعَهُ اللَّهُ» (رواه البخاري، رقم 5989، ومسلم، رقم 2555).</p><p><strong>الشرح المختصر:</strong> الرحم شجنة من الرحمن، أي متصلة باسمه \"الرحمن\". من وصلها وصله الله برحمته وتوفيقه، ومن قطعها قطعه الله من فضله. لا تقل: \"قريبي لا يسأل عني، إذن لن أسأل عنه\"، فأنت تصلهم لله، لا مكافأة لهم. قال النبي ﷺ: «لَيْسَ الْوَاصِلُ بِالْمُكَافِئِ، وَلَكِنِ الْوَاصِلُ الَّذِي إِذَا قُطِعَتْ رَحِمُهُ وَصَلَهَا» (رواه البخاري، رقم 5991).</p><p><strong>النموذج التطبيقي:</strong> 1- أمسك هاتف والدك أو والدتك، واتصل بعمك أو خالك واسأل عنه: \"كيف حالك يا عمي؟ اشتقت إليك\". 2- في العيد، اذهب مع والدك لزيارة الأقارب. 3- إذا سمعت أن أحد أقاربك مريض، فزره أو اسأل عنه بالهاتف. 4- احفظ أسماء أبناء عمومتك وأخوالك، واسأل عنهم دائماً.</p><p><strong>الفائدة التربوية:</strong> صلة الرحم تزيد في العمر وتبارك في الرزق. قال النبي ﷺ: «مَنْ سَرَّهُ أَنْ يُبْسَطَ لَهُ فِي رِزْقِهِ، وَيُنْسَأَ لَهُ فِي أَثَرِهِ، فَلْيَصِلْ رَحِمَهُ» (رواه البخاري، رقم 2067، ومسلم، رقم 2557). فلتكن لك جولات على أقاربك دائماً.</p>"
    },
    {
      "title": "الدرس الحادي عشر: حفظ اللسان",
      "content": "<p><strong>الفقرة الأساسية:</strong> اللسان نعمة، ولكنه قد يكون أخطر عضو في الجسد. يجب حفظه عن: الغيبة (ذكر أخاك بما يكره)، والنميمة (نقل الكلام بين الناس للإفساد)، والكذب، والفحش، والسباب، وشهادة الزور، وكثرة الكلام فيما لا يفيد. الصمت في غير خير عبادة.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «وَهَلْ يَكُبُّ النَّاسَ فِي النَّارِ عَلَى وُجُوهِهِمْ - أَوْ عَلَى مَنَاخِرِهِمْ - إِلَّا حَصَائِدُ أَلْسِنَتِهِمْ؟» (رواه الترمذي، رقم 2616، وصححه الألباني). وقال: «مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الْآخِرِ، فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ» (رواه البخاري، رقم 6018، ومسلم، رقم 47).</p><p><strong>الشرح المختصر:</strong> \"حصائد الألسنة\" أي جزاء ما نطق به اللسان من شر. كثير من الناس يدخلون النار بسبب كلمة واحدة قالوها دون تفكير. الغيبة أن تقول عن زميلك: \"إنه قصير، إنه غبي، إنه لبسه رديء\". النميمة أن تنقل كلاماً بين صديقين ليفترقا. كل هذا من كبائر الذنوب. قاعدة ذهبية: \"تكلم بالخير وإلا فاصمت\".</p><p><strong>النموذج التطبيقي:</strong> 1- إذا جلست مع أصدقائك وبدأوا في الغيبة، فقل: \"يا شباب، اتقوا الله، هذا حرام\"، أو غيّر الموضوع بلباقة. 2- قبل أن تنطق بأي كلمة، اسأل نفسك بسرعة: \"هل ترضي الله؟ هل هي ضرورية؟ هل ستجرح أحداً؟\". 3- إذا سمعت كلاماً سيئاً عن شخص وذهبت لتخبره، فأنت نمام، توقف فوراً. 4- إذا أردت أن تنتقد أحداً، فليكن نقدك لشخصه مباشرة بلطف، لا في غيبته.</p><p><strong>الفائدة التربوية:</strong> كل كلمة تقولها مسجلة عليك، إما لك أو عليك. قال تعالى: ﴿مَا يَلْفِظُ مِنْ قَوْلٍ إِلَّا لَدَيْهِ رَقِيبٌ عَتِيدٌ﴾ [ق: 18]. تخيل أن كل كلامك يُكتب، فليكن كلامك درراً. وقديماً قيل: \"لسان الفتى نصفٌ ونصف فؤاده، فلم يبقَ إلا صورة اللحم والدم\".</p>"
    },
    {
      "title": "الدرس الثاني عشر: الرفق والتسامح",
      "content": "<p><strong>الفقرة الأساسية:</strong> الرفق هو لين الجانب في القول والفعل، وهو ضد العنف. والرفق من أجمل الأخلاق، وما كان في شيء إلا زانه، وما نزع من شيء إلا شانه. والتسامح هو العفو عن المخطئ وعدم مقابلة الإساءة بالإساءة. النبي ﷺ كان أرفق الناس، وما انتقم لنفسه قط.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «إِنَّ اللَّهَ رَفِيقٌ يُحِبُّ الرِّفْقَ، وَيُعْطِي عَلَى الرِّفْقِ مَا لاَ يُعْطِي عَلَى الْعُنْفِ، وَمَا لاَ يُعْطِي عَلَى مَا سِوَاهُ» (رواه مسلم، رقم 2593). وقال: «مَنْ لَا يَرْحَمِ النَّاسَ لَا يَرْحَمْهُ اللَّهُ» (رواه البخاري، رقم 7376، ومسلم، رقم 2319).</p><p><strong>الشرح المختصر:</strong> تخيل! الله يعطي على الرفق أجراً وفضلاً لا يعطيه على أي عمل آخر. الرفق مع إخوانك الصغار، مع أصدقائك، مع الحيوانات. التسامح أنك إذا خاصمك صديقك، سارعت إليه وسامحته، ولم تنتظر حتى يأتي هو. قال النبي ﷺ: «لَا يَحِلُّ لِمُسْلِمٍ أَنْ يَهْجُرَ أَخَاهُ فَوْقَ ثَلَاثِ لَيَالٍ» (رواه البخاري، رقم 6077، ومسلم، رقم 2560).</p><p><strong>النموذج التطبيقي:</strong> 1- إذا دفعك أحد في الطابور خطأً، تبسم وقل: \"لا بأس، حصل خير\". 2- إذا أخطأ أخوك الصغير وكسر لعبتك، لا تصرخ في وجهه، بل قل: \"انتبه المرة القادمة يا بطل\". 3- إذا اختلفت مع صديقك، لا تقاطعه أكثر من ثلاثة أيام، بل اذهب إليه وصالحه، وخيركما الذي يبدأ بالسلام. 4- عامل الحيوانات برفق، فلا تؤذِ قطة أو عصفوراً.</p><p><strong>الفائدة التربوية:</strong> الرفيق يحبه الله ويحبه الناس. العنيف ينفر منه الجميع. كن رفيقاً في كلامك، رفيقاً في مشيتك، رفيقاً في لعبك. تذكر قصة الأعرابي الذي بال في المسجد، فهمّ الصحابة أن يوقعوا به، فقال النبي ﷺ: «دَعُوهُ... إِنَّمَا بُعِثْتُمْ مُيَسِّرِينَ وَلَمْ تُبْعَثُوا مُعَسِّرِينَ» (رواه البخاري، رقم 220). هذا هو الرفق.</p>"
    },
    {
      "title": "الدرس الثالث عشر: أهمية الذكر وفضله",
      "content": "<p><strong>الفقرة الأساسية:</strong> الذكر هو عبادة عظيمة، وهو طعام الروح، وسبيل الطمأنينة. والذاكرون الله كثيراً هم السابقون إلى الخيرات. والذكر يحصنك من الشيطان، ويجلب لك السعادة، ويكفر السيئات، ويرفع الدرجات. ومن أفضل الأذكار: أذكار الصباح والمساء، وأذكار ما بعد الصلاة، وأذكار النوم.</p><p><strong>الدليل:</strong> قال تعالى: ﴿فَاذْكُرُونِي أَذْكُرْكُمْ وَاشْكُرُوا لِي وَلَا تَكْفُرُونِ﴾ [البقرة: 152]. وقال النبي ﷺ: «مَثَلُ الَّذِي يَذْكُرُ رَبَّهُ وَالَّذِي لاَ يَذْكُرُ رَبَّهُ مَثَلُ الْحَيِّ وَالْمَيِّتِ» (رواه البخاري، رقم 6407).</p><p><strong>الشرح المختصر:</strong> الله يعدنا بقوله: \"اذكروني أذكركم\"، يعني إذا ذكرت الله ذكرك الله في الملأ الأعلى، ورحمك، ووفقك. حافظ على الأذكار في أوقاتها المحددة فهي درعك. من ترك الذكر صار قلبه قاسياً مثل الميت في قبره. وأفضل أوقات الذكر الصباح بعد الفجر، والمساء بعد العصر.</p><p><strong>النموذج التطبيقي:</strong> لا يمر عليك يوم أبداً دون أن تقول: \"سبحان الله وبحمده\" (100 مرة). قال النبي ﷺ: «مَنْ قَالَ: سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، فِي يَوْمٍ مِائَةَ مَرَّةٍ، حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ» (رواه البخاري، رقم 6405، ومسلم، رقم 2691). تدرب على هذا الذكر السهل العظيم الأجر.</p><p><strong>الفائدة التربوية:</strong> الذكر لا يحتاج وضوءاً ولا مكاناً خاصاً، يمكنك وأنت تمشي، أو تركب السيارة، أو تنتظر الدرس. فاجعل لسانك رطباً بذكر الله. قال النبي ﷺ: «أَحَبُّ الْأَعْمَالِ إِلَى اللَّهِ أَنْ تَمُوتَ وَلِسَانُكَ رَطْبٌ مِنْ ذِكْرِ اللَّهِ» (رواه الطبراني وحسنه الألباني في صحيح الجامع، رقم 165).</p>"
    },
    {
      "title": "الدرس الرابع عشر: أذكار الصباح والمساء",
      "content": "<p><strong>الفقرة الأساسية:</strong> أذكار الصباح والمساء هي حصنك اليومي من الشيطان والشرور. وقتها: الصباح من الفجر إلى الشروق، والمساء من العصر إلى المغرب. وهي تشمل: قراءة المعوذات (الإخلاص، الفلق، الناس) ثلاثاً، وآية الكرسي، وسيد الاستغفار، وبعض الأدعية المأثورة.</p><p><strong>الدليل:</strong> قال تعالى: ﴿وَسَبِّحْ بِحَمْدِ رَبِّكَ قَبْلَ طُلُوعِ الشَّمْسِ وَقَبْلَ الْغُرُوبِ﴾ [طه: 130]. وقال النبي ﷺ: «مَنْ قَالَ حِينَ يُصْبِحُ وَحِينَ يُمْسِي: سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، مِائَةَ مَرَّةٍ، لَمْ يَأْتِ أَحَدٌ يَوْمَ الْقِيَامَةِ بِأَفْضَلَ مِمَّا جَاءَ بِهِ...» (رواه مسلم، رقم 2692).</p><p><strong>الشرح المختصر:</strong> احرص على هذه الأذكار فهي وقاية عظيمة. من قرأ آية الكرسي في الصباح حفظ من الجن حتى يمسي، ومن قرأها في المساء حفظ حتى يصبح. ومن قال \"بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء\" ثلاثاً، لم يضره شيء.</p><p><strong>النموذج التطبيقي (بطاقة مختصرة لأذكار الصباح والمساء):</strong> أمسك ورقة صغيرة، واكتب فيها هذه الأذكار، واحفظها، ورددها كل صباح ومساء:<br/>1- آية الكرسي (مرة واحدة): ﴿اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...﴾ [البقرة: 255].<br/>2- المعوذات (الإخلاص، الفلق، الناس) (ثلاث مرات)، تنفث في كفيك وتمسح بهما جسدك.<br/>3- سبحان الله وبحمده (مائة مرة).<br/>4- بسم الله الذي لا يضر مع اسمه شيء... (ثلاثاً).<br/>5- سيد الاستغفار: \"اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك...\".<br/>6- اللهم إني أصبحت (أمسيت) أشهدك وأشهد حملة عرشك... أنك أنت الله لا إله إلا أنت... (أربع مرات).<br/>(اجعلها عادة ملازمة لك كشرب الماء، لا يمر صباحك ولا مساؤك بدونها).</p><p><strong>الفائدة التربوية:</strong> بهذه الأذكار، تكون قد بنيت حول نفسك سوراً من الحماية. يشعر الإنسان أحياناً بضيق في الصدر أو كسل غريب، فيكون ذلك من الشيطان، وعلاجه الأذكار. اجعلها أول ما تبدأ به يومك، وآخر ما تنام عليه.</p>"
    },

      "title": "الدرس الخامس عشر: أذكار الأحوال المختلفة (جدول عملي)",
      "content": "<p><strong>الفقرة الأساسية:</strong> للمسلم ذكر مشروع في كل حال من أحواله اليومية. هذه الأذكار تبارك له في عمله، وتذكره بالله على كل حال، وتجعله دائم الصلة بربه. إنها تحول الحياة اليومية كلها إلى عبادة.</p><p><strong>الدليل:</strong> كان النبي ﷺ يذكر الله على كل أحيانه. قالت عائشة رضي الله عنها: «كَانَ النَّبِيُّ ﷺ يَذْكُرُ اللَّهَ عَلَى كُلِّ أَحْيَانِهِ» (رواه مسلم، رقم 373).</p><p><strong>الجدول العملي (اجعل هذه الأذكار رفيقتك):</strong></p><table border='1'><tr><th>الموقف</th><th>الذكر</th></tr><tr><td>عند الاستيقاظ</td><td>\"الحمد لله الذي أحيانا بعد ما أماتنا وإليه النشور\"</td></tr><tr><td>عند دخول الخلاء</td><td>\"بسم الله، اللهم إني أعوذ بك من الخبث والخبائث\"</td></tr><tr><td>عند الخروج من الخلاء</td><td>\"غفرانك\"</td></tr><tr><td>عند الوضوء</td><td>\"بسم الله\"، وبعد الوضوء: \"أشهد أن لا إله إلا الله...\"</td></tr><tr><td>عند الأكل</td><td>\"بسم الله\"، وعند النسيان: \"بسم الله أوله وآخره\"</td></tr><tr><td>عند الفراغ من الأكل</td><td>\"الحمد لله الذي أطعمني هذا ورزقنيه من غير حول مني ولا قوة\"</td></tr><tr><td>عند الخروج من المنزل</td><td>\"بسم الله، توكلت على الله، لا حول ولا قوة إلا بالله\"</td></tr><tr><td>عند دخول المنزل</td><td>\"بسم الله ولجنا، وبسم الله خرجنا، وعلى ربنا توكلنا\"، ثم تسلم على أهلك</td></tr><tr><td>عند ركوب السيارة</td><td>\"سبحان الذي سخر لنا هذا وما كنا له مقرنين وإنا إلى ربنا لمنقلبون\"</td></tr><tr><td>عند لبس الثوب الجديد</td><td>\"اللهم لك الحمد أنت كسوتنيه، أسألك خيره وخير ما صنع له...\"</td></tr><tr><td>عند رؤية المبتلى (مريض/ معاق)</td><td>\"الحمد لله الذي عافاني مما ابتلاك به، وفضلني على كثير ممن خلق تفضيلاً\"</td></tr><tr><td>عند الغضب</td><td>الاستعاذة بالله من الشيطان: \"أعوذ بالله من الشيطان الرجيم\"، والجلوس إن كنت قائماً، والتوضؤ</td></tr><tr><td>عند سماع الديك</td><td>\"اللهم إني أسألك من فضلك\" (لأنه رأى ملكاً)</td></tr><tr><td>عند سماع الحمار</td><td>\"أعوذ بالله من الشيطان الرجيم\" (لأنه رأى شيطاناً)</td></tr><tr><td>عند العطاس</td><td>\"الحمد لله\"، ويرد عليه السامع: \"يرحمك الله\"، فيقول العاطس: \"يهديكم الله ويصلح بالكم\"</td></tr></table><p><strong>النموذج التطبيقي:</strong> اطبع هذا الجدول وعلقه في غرفتك، أو احفظه في هاتفك. كلما مررت بموقف، انظر إلى الذكر المخصص له وقله. في البداية ستحتاج إلى تذكير نفسك، وبعد أسبوعين ستصبح هذه الأذكار جزءاً من كلامك اليومي دون تفكير، وستشعر ببركة عجيبة في حياتك.</p><p><strong>الفائدة التربوية:</strong> هذه الأذكار تجعل حياتك كلها ذكراً لله. النبي ﷺ علمنا كيف نعيش مع الله في كل لحظة. قارن بين إنسان يستيقظ ويخرج ويدخل ويأكل بلا ذكر، وإنسان آخر يذكر الله في كل حركة. أيهما أقرب إلى الله؟ أيهما في حماية الله؟ بالتأكيد الثاني.</p>"
    },
    {
      "title": "خاتمة الكراسة",
      "content": "<p>الحمد لله الذي هدانا لهذا، وما كنا لنهتدي لولا أن هدانا الله.</p><p>يا بني ويا بنتي، لقد طفنا معاً في رياض الآداب والأخلاق والأذكار، وتعلمنا كيف يكون المسلم في يومه وليلته، في يقظته ومنامه، في أكله وشربه، في حديثه وصمته، في بيته ومدرسته. هذه الأخلاق ليست مجرد دروس تحفظ، بل هي حياة كاملة تعيشها. قال الشاعر:</p><p>إنما الأمم الأخلاق ما بقيت... فإن هم ذهبت أخلاقهم ذهبوا</p><p>اجعــل شعــارك: \"هــذه أخلاقــي\". افتخــر بأخلاقك الإسلامية، وتمسك بها، وكن قدوة لغيرك. وتذكــر دائماً أنــك تتبع أعظم إنســان عرفته البشرية، محمداً ﷺ. فكن خير متابع لخير نبي.</p><p><strong>وصية ختامية:</strong> كتب عمر بن الخطاب رضي الله عنه إلى عماله: \"عليكم بالصدق والبر والأخلاق، فإن هذه الثلاث تجلب المصالح وتدفع المفاسد\". فالزم هذه الأخلاق تكن من الفائزين في الدنيا والآخرة.</p><p>انتهت كراسة \"هذه أخلاقي\" بحمد الله ومنه.</p>"

      "title": "تحذير هام قبل الدخول إلى الكراسة",
      "content": "<p>يا بني ويا بنتي، قبل أن نبدأ رحلتنا في هذه الكراسة المهمة، عليّ أن أحذرك من أمر خطير جداً:</p><p>الشبهات كالجراثيم الفكرية. إذا دخلت إلى عقلك دون أن تكون مستعداً بالعلم والدليل، فقد تمرض قلبك وتضعف إيمانك. لذلك، لا تقرأ هذه الكراسة وحدك في البداية، بل اقرأها مع معلمك أو والدك. ولا تبحث عن الشبهات بنفسك في الإنترنت أو تتابع أصحابها. هذه الكراسة تعطيك \"عيناً على الشبهات\" لتعرف أنها موجودة، و\"عيناً على الردود\" لتعرف أن الإسلام يعلو ولا يعلى عليه. كن حذراً، وكن ذكياً، وكن متسلحاً دائماً بالعلم والدعاء: \"اللهم ثبتني على دينك\".</p>"

      "title": "مقدمة الكراسة",
      "content": "<p>بسم الله الرحمن الرحيم</p><p>الحمد لله الذي جعل دينه كاملاً وشريعته تامة، وجعل الإسلام ظاهراً على كل دين. والصلاة والسلام على النبي الأمي، الذي بعثه الله بالهدى ودين الحق، ليظهره على الدين كله ولو كره المشركون.</p><p>يا أبطال الحق، في هذا الزمن الذي كثرت فيه الوسائل والاتصالات، أصبحت الشبهات تحيط بنا من كل جانب. المستشرقون يطعنون في القرآن، والملحدون يشككون في وجود الله، والنصارى يثيرون شبهات حول النبي ﷺ، والعلمانيون يريدون إبعاد الدين عن الحياة. ولكن تذكر دائماً: الباطل له جولة، ثم يضمحل ويزول. ومهمتنا في هذه الكراسة أن نتعلم كيف نكشف الشبهات، ونرد عليها بعلم وحكمة، فيزداد إيماننا ويقوى يقيننا.</p><p><strong>طريقة المذاكرة:</strong> في كل درس سنتعامل مع شبهة كما نفعل مع أي مشكلة:<br/>الشبهة: ما هي الشبهة التي يثيرها الأعداء؟<br/>الدليل: ما هو الدليل من القرآن أو السنة أو العقل الذي يردها؟<br/>الشرح المختصر: كيف نفهم الرد بأسلوب بسيط وعميق؟<br/>النموذج التطبيقي: كيف نرد عملياً إذا واجهنا هذه الشبهة في حوار؟<br/>الفائدة التربوية: كيف نزداد إيماناً من خلال هذه المعرفة؟</p>"

    {
      "title": "الشبهة الأولى: \"من خلق الله؟\"",
      "content": "<p><strong>الشبهة:</strong><br/>يقول الملحد أو الطفل الصغير الذي وسوس له الشيطان: \"أنتم تقولون إن لكل شيء خالقاً، فمن خلق الله إذن؟ إذا كان الله خالقاً، فلا بد أن يكون له خالق!\"</p><p><strong>الرد بالدليل:</strong><br/>قال النبي ﷺ: «يَأْتِي الشَّيْطَانُ أَحَدَكُمْ فَيَقُولُ: مَنْ خَلَقَ كَذَا؟ مَنْ خَلَقَ كَذَا؟ حَتَّى يَقُولَ: مَنْ خَلَقَ رَبَّكَ؟ فَإِذَا بَلَغَهُ فَلْيَسْتَعِذْ بِاللَّهِ وَلْيَنْتَهِ» (رواه البخاري، رقم 3276، ومسلم، رقم 134).<br/>وقال تعالى: ﴿اللَّهُ خَالِقُ كُلِّ شَيْءٍ﴾ [الزمر: 62].</p><p><strong>الشرح المختصر:</strong><br/>هذا السؤال خطأ منطقي في أصله! لماذا؟ لأنك تسأل: \"من خلق الخالق؟\" هذا مثل أن تسأل: \"من تزوج العازب؟\" أو \"ما لون الصوت؟\". القاعدة: الله هو الخالق، والزمان والمكان والخلق كله مخلوق له. هو \"الأول\" الذي ليس قبله شيء. الخالق لا تنطبق عليه قوانين المخلوقين. المخلوق يحتاج إلى خالق، أما الخالق فهو غني عن كل شيء. إذا قلت: \"من خلق الله؟\" فأنت تعامل الخالق كأنه مخلوق، وهذا تناقض. النبي ﷺ علمنا دواء هذه الوسوسة: \"فليستعذ بالله ولينته\". لا تكمل التفكير فيها، بل استعذ بالله فوراً.</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>إذا سألك أحدهم: \"من خلق الله؟\" قل له: \"سؤالك خطأ. أنت تسأل عن خالق الخالق! الله هو الذي خلق المكان والزمان والخلق، هو الأول الذي ليس قبله شيء. هل يمكن أن يكون هناك شيء قبل الأول؟ مستحيل! سؤالك مثل سؤال: ما شمال الشمال؟ لا يوجد!\"</p><p><strong>الفائدة التربوية:</strong><br/>هذه الشبهة تدل على أن العقل البشري له حدود. لا تستطيع أن تفهم كل شيء بعقلك. الله عظيم لا يحيط به العقل. إذا جاءتك هذه الوسوسة، فلا تخف ولا تقلق، بل استعذ بالله وانتهِ، فهي من الشيطان.</p>"

    {
      "title": "الشبهة الثانية: \"لماذا لا نرى الله؟\"",
      "content": "<p><strong>الشبهة:</strong><br/>يقول الملحد: \"إذا كان الله موجوداً، فلماذا لا نراه بأعيننا؟ لماذا يختفي عنا؟\"</p><p><strong>الرد بالدليل:</strong><br/>قال الله تعالى: ﴿لَا تُدْرِكُهُ الْأَبْصَارُ وَهُوَ يُدْرِكُ الْأَبْصَارَ ۖ وَهُوَ اللَّطِيفُ الْخَبِيرُ﴾ [الأنعام: 103].<br/>ولما سأل موسى عليه السلام رؤية الله، قال له: ﴿لَنْ تَرَانِي﴾ [الأعراف: 143].</p><p><strong>الشرح المختصر:</strong><br/>عدم رؤيتنا للشيء لا يعني أنه غير موجود. هل ترى الهواء الذي تتنفسه؟ لا. لكنك تشعر به وتعلم أنه موجود، وإلا لكنت ميتاً. هل ترى عقلك؟ لا. لكنك تفكر به. هل ترى الكهرباء في السلك؟ لا، لكنك ترى أثرها (النور). وجود الله أعظم من أن تدركه أبصارنا الضعيفة. عيوننا خلقت لترى أشياء محدودة (الضوء المرئي فقط). الله نور السماوات والأرض، لو تجلى لخلقه لاحترق كل شيء لعظمته. عدم رؤيتنا له في الدنيا اختبار، وفي الآخرة يراه المؤمنون في الجنة، وهذه أعظم نعيم.</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>قل: \"هل ترى الجاذبية الأرضية؟ لا، لكنك تؤمن بها لأنك ترى أثرها (سقوط الأشياء). هل ترى الحب الذي تكنه لأمك؟ لا، لكنك تشعر به. الله لا تدركه الأبصار في الدنيا، لكننا نرى آثاره في كل شيء: في جمال الطبيعة، في إجابة الدعاء، في خلق الكون. غياب الرؤية ليس دليلاً على غياب الوجود!\"</p><p><strong>الفائدة التربوية:</strong><br/>الإيمان بالغيب هو أساس التقوى. الله أثنى على المؤمنين بقوله: ﴿الَّذِينَ يُؤْمِنُونَ بِالْغَيْبِ﴾ [البقرة: 3]. إذا كنت لا ترى الله، فاعلم أنه يراك، وهذا أدعى للاستحياء والمراقبة.</p>"
    },
    {
      "title": "الشبهة الثالثة: \"القرآن كتبه محمد ﷺ من عنده\"",
      "content": "<p><strong>الشبهة:</strong><br/>يقول المستشرقون وبعض العلمانيين: \"القرآن ليس وحياً من الله، بل هو من تأليف محمد. لقد كان عبقرياً وألف هذا الكتاب.\"</p><p><strong>الرد بالدليل:</strong><br/>1- النبي ﷺ كان أُمّياً لا يقرأ ولا يكتب، عاش أربعين سنة قبل البعثة لم يُعرف عنه شيء من هذا القبيل، ولا كان شاعراً ولا كاتباً. قال تعالى: ﴿وَمَا كُنْتَ تَتْلُو مِنْ قَبْلِهِ مِنْ كِتَابٍ وَلَا تَخُطُّهُ بِيَمِينِكَ ۖ إِذًا لَارْتَابَ الْمُبْطِلُونَ﴾ [العنكبوت: 48].<br/>2- القرآن مليء بالحقائق العلمية والتاريخية (مثل قصة فرعون وغرق جسده، ومراحل خلق الجنين) التي لم تكن معروفة وقتها. كيف عرفها محمد الأمي؟<br/>3- القرآن يتحدى العرب والجن أن يأتوا بمثله: ﴿قُلْ لَئِنِ اجْتَمَعَتِ الْإِنْسُ وَالْجِنُّ عَلَىٰ أَنْ يَأْتُوا بِمِثْلِ هَٰذَا الْقُرْآنِ لَا يَأْتُونَ بِمِثْلِهِ وَلَوْ كَانَ بَعْضُهُمْ لِبَعْضٍ ظَهِيرًا﴾ [الإسراء: 88]. فشلوا جميعاً!<br/>4- القرآن فيه آيات تعاتب النبي ﷺ بشدة، فهل يعقل أن ألف كتاباً يعاتب نفسه فيه؟! كقوله: ﴿يَا أَيُّهَا النَّبِيُّ لِمَ تُحَرِّمُ مَا أَحَلَّ اللَّهُ لَكَ﴾ [التحريم: 1].</p><p><strong>الشرح المختصر:</strong><br/>النبي ﷺ لم يكن قارئاً ولا كاتباً ولا مثقفاً. هو عاش في صحراء جرداء، بعيداً عن مراكز الحضارة. ثم فجأة في سن الأربعين، يأتي بكتاب فيه علوم كونية وتاريخية وتشريعية كاملة، لا مثيل له في البلاغة، وينسبه لله، ويتحدى به العالمين، ويعرض نفسه للقتل في سبيله، وهو المعروف بالصدق والأمانة. أليس هذا دليلاً على أنه من عند الله؟ الكاذب يبحث عن المصلحة. النبي ترك كل مصالح الدنيا من أجل رسالة القرآن.</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>\"كيف لرجل أمي عاش في الصحراء قبل 1400 سنة أن يصف مراحل الجنين بدقة: ﴿نُطْفَةً... عَلَقَةً... مُضْغَةً﴾ [المؤمنون: 13-14]، وهذه لم تُكتشف إلا بالمجاهر الحديثة؟ كيف عرف أن الشمس تجري: ﴿وَالشَّمْسُ تَجْرِي لِمُسْتَقَرٍّ لَهَا﴾ [يس: 38]، والناس كانوا يظنونها ثابتة؟ هل كان لديه مختبر علمي؟ أم أنزل القرآن الذي يعلم السر في السماوات والأرض؟\"</p><p><strong>الفائدة التربوية:</strong><br/>كلما قرأت القرآن وتأملته، ازددت يقيناً بأنه كلام الله. فاجعل لك ورداً يومياً من تلاوته وتدبر معانيه.</p>"
    },
    {
      "title": "الشبهة الرابعة: \"القرآن محرف أو فيه نسخ وتناقضات\"",
      "content": "<p><strong>الشبهة:</strong><br/>يقول أعداء الإسلام: \"القرآن فيه آيات متناقضة، وفيه آيات نُسخت، وهذا دليل على أنه ليس من عند الله.\"</p><p><strong>الرد بالدليل:</strong><br/>1- القرآن محفوظ: قال تعالى: ﴿إِنَّا نَحْنُ نَزَّلْنَا الذِّكْرَ وَإِنَّا لَهُ لَحَافِظُونَ﴾ [الحجر: 9]. قارن هذا بالإنجيل والتوراة اللذين ضاعا وحُرفا، فإن القرآن نقل إلينا بالتواتر جيلاً عن جيل، لم يتغير حرف واحد.<br/>2- لا تناقض أبداً: قال تعالى: ﴿وَلَوْ كَانَ مِنْ عِنْدِ غَيْرِ اللَّهِ لَوَجَدُوا فِيهِ اخْتِلَافًا كَثِيرًا﴾ [النساء: 82]. كل ما يظنه البعض تناقضاً هو اختلاف تنوع لا تضاد، ويمكن الجمع بينه.<br/>3- النسخ في القرآن: النسخ رحمة من الله. كان الخمر مثلاً محرماً تدريجياً: (تسألون عنه) ثم (لا تقربوا الصلاة وأنتم سكارى) ثم (فاجتنبوه). هذا تدرج في التشريع لا تناقض. الآيات المنسوخة هي من عند الله، والناسخة من عند الله. الطبيب يغير الدواء حسب حالة المريض، أهذا تناقض؟ بل حكمة!</p><p><strong>الشرح المختصر:</strong><br/>التناقض أن تقول: \"الخمر حلال\" ثم تقول: \"الخمر حرام\" في وقت واحد. أما أن تقول: \"اتركوه تدريجياً\" فهذا تدرج. والنسخ موجود حتى في القوانين البشرية: قانون يُلغى ويأتي غيره. القرآن يعالج مراحل مختلفة: مرحلة مكة كانت لبناء العقيدة، ومرحلة المدينة لبناء التشريع.</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>\"لا يوجد في القرآن ولا آية واحدة تتعارض مع أخرى بشكل قطعي. كل ما تجده هو تنوع في التشريع بحسب الوقائع. مثل قوله: ﴿فَاعْفُوا وَاصْفَحُوا﴾ ثم ﴿قَاتِلُوا﴾. الأولى في مرحلة الضعف، والثانية في مرحلة القوة. هذا هو التدرج الطبيعي في بناء أي أمة. أين التناقض؟\"</p><p><strong>الفائدة التربوية:</strong><br/>اطلب العلم الشرعي لتفهم الحكمة من التشريع. كثير من \"التناقضات\" المزعومة تزول بمجرد أن تفهم سياق الآيات وأسباب نزولها.</p>"
    },

      "title": "الشبهة الخامسة: \"لماذا تزوج النبي محمد ﷺ تسع نساء؟\"",
      "content": "<p><strong>الشبهة:</strong><br/>هذه من أشهر الشبهات التي يرددها المستشرقون والنصارى، ويقولون: \"كيف يكون نبياً وهو يتزوج هذا العدد من النساء؟ إنه دليل على شهوته!\"</p><p><strong>الرد بالدليل:</strong><br/>1- النبي ﷺ عاش شاباً إلى سن الخامسة والعشرين عازباً في مجتمع فاجر، ولم يُعرف عنه أي علاقة محرمة.<br/>2- تزوج خديجة رضي الله عنها وهي أكبر منه بخمس عشرة سنة، وعاش معها خمساً وعشرين سنة لم يتزوج عليها قط.<br/>3- كل زوجاته بعد خديجة كن أرامل (مطلقات) إلا عائشة. تزوجهن كان لحكم تشريعية واجتماعية وسياسية: كإيواء الأرامل (أم سلمة، زينب)، وتوثيق الروابط مع القبائل، وتشريع أحكام جديدة (كزواجه بزينب بنت جحش لإبطال التبني).<br/>4- هذا العدد خصوصية للنبي ﷺ فقط، وأمته لا يحق لها ذلك (أقصى عدد 4).</p><p><strong>الشرح المختصر:</strong><br/>من يتهم النبي ﷺ بالشهوة، كمن يتهم الطبيب الذي يعمل في مستشفى المجذومين بأنه يحب الجذام! النبي ﷺ كان قائد دولة، وتعدد زوجاته كان جزءاً من بناء الأمة. لو كان رجل شهوة لتزوج شابات جميلات من مكة، لكنه تزوج نساء كباراً في السن، أرامل، فقيرات، ليعلمنا التضحية والرحمة. هذا هو النبي.</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>\"هل تعلم أن النبي ﷺ تزوج خديجة وعمره 25 سنة وهي 40 سنة، وبقيت زوجته الوحيدة 25 سنة؟ هل هذا فعل رجل شهواني؟ كل زوجاته بعد موتها كن أرامل أو مطلقات أو كبيرات في السن إلا واحدة. هذه زيجات سياسية واجتماعية لبناء مجتمع جديد. اقرأ التاريخ قبل أن تتهم!\"</p><p><strong>الفائدة التربوية:</strong><br/>النبي ﷺ بشر، يأكل الطعام ويمشي في الأسواق، لكنه معصوم في تبليغ الرسالة. زواجه كان تكليفاً وجهاداً، لا شهوة. تعلم من هذا أن تنظر إلى حياة القادة بعين الحكمة، لا بعين الهوى.</p>"
    },
    {
      "title": "الشبهة السادسة: \"الإسلام انتشر بحد السيف!\"",
      "content": "<p><strong>الشبهة:</strong><br/>يقول أعداء الإسلام: \"محمد ﷺ كان رجل حرب، وقتل الناس حتى دخلوا في الإسلام، ولهذا انتشر الإسلام بالسيف والإرهاب!\"</p><p><strong>الرد بالدليل:</strong><br/>1- القرآن ينص على حرية الاعتقاد: قال تعالى: ﴿لَا إِكْرَاهَ فِي الدِّينِ﴾ [البقرة: 256].<br/>2- النبي ﷺ لم يُكره أحداً: كل الحروب التي خاضها كانت دفاعية (بدر، أحد، الخندق) أو بسبب نقض العهود من الأعداء.<br/>3- فتح مكة: دخلها النبي ﷺ بعشرة آلاف مقاتل، لم يقتل فيها إلا نفراً يسيراً هم من أجرموا، وقال لأهل مكة: \"اذهبوا فأنتم الطلقاء\". لو كان يريد القتل والإكراه لقتلهم جميعاً.<br/>4- انتشار الإسلام في شرق آسيا: إندونيسيا أكبر دولة إسلامية، لم تطأها جيوش المسلمين أبداً! دخلها الإسلام بالتجار والأخلاق.<br/>5- مقارنة بسيطة: انظر إلى الحروب الصليبية، وحروب الإسبان في الأندلس، كم قتلت من المسلمين واليهود وأجبرتهم على التنصير؟ الفرق واضح!</p><p><strong>الشرح المختصر:</strong><br/>الحرب في الإسلام وضعت لرد العدوان ولفتح الطريق للدعوة، لا لإكراه الناس. الجيوش الإسلامية كانت تقاتل الجيوش المعتدية، أما عامة الناس فكانوا يتركون أحراراً. شعار الإسلام: \"من شاء فليؤمن ومن شاء فليكفر\". الجزية التي فرضت على غير المسلمين كانت مقابل حمايتهم، وهم لا يخدمون في الجيش. أين الإرهاب في هذا؟ النبي ﷺ قال: «مَنْ قَتَلَ مُعَاهَدًا لَمْ يَرِحْ رَائِحَةَ الْجَنَّةِ» (رواه البخاري، رقم 3166).</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>\"هل تعلم أن أكبر دولة إسلامية (إندونيسيا) لم يدخلها جيش مسلم واحد قط؟ دخلها التجار بأخلاقهم وأمانتهم! لو كان الإسلام بالسيف، لماذا توجد كنائس وملايين المسيحيين في مصر والشام منذ 1400 سنة؟ معنى ذلك أن المسلمين حكموا 1400 سنة ولم يجبروهم على الإسلام! أين السيف إذن؟\"</p><p><strong>الفائدة التربوية:</strong><br/>الإسلام دين سلام، والجهاد شُرع لرد الظلم ورفع الفتنة. لا تصدق الأكاذيب التي تصور الإسلام دين عنف، بل انظر إلى سيرة النبي ﷺ الرحيمة مع أعدائه.</p>"
    },
    {
      "title": "الشبهة السابعة: \"الإسلام يضطهد المرأة وينتقصها (الحجاب، الميراث، الشهادة)\"",
      "content": "<p><strong>الشبهة:</strong><br/>يقول العلمانيون والتنويريون: \"الإسلام يعتبر المرأة نصف الرجل! فميراثها نصف ميراثه، وشهادتها نصف شهادته، والحجاب سجن لها وقمع لحريتها!\"</p><p><strong>الرد بالدليل:</strong><br/>1- الميراث: ليس صحيحاً أن المرأة دوماً نصف الرجل. هناك حالات ترث فيها مثله أو أكثر. والسبب في أغلب الحالات أن الرجل هو المكلف شرعاً بالإنفاق عليها، حتى لو كانت غنية، فمالها لها وحدها. الرجل يأخذ ويُنفق، والمرأة تأخذ ولا تنفق، فأيهما أفضل حالاً؟<br/>2- الشهادة: في قضايا الأموال فقط. أما في قضايا أخرى، فشهادة المرأة كشهادة الرجل، بل وفي أمور النساء تقبل شهادتها وحدها. والسبب أن المرأة قد تنسى لقلة خبرتها بالمعاملات المالية، فتذكرها الأخرى.<br/>3- الحجاب: تكريم لا قمع. المرأة جوهرة مصونة، لا يراها كل أحد. الحجاب يحميها من التحرش ويصون كرامتها. انظر إلى المرأة في الغرب: أصبحت سلعة تباع وتشترى، وتستغل جنسياً، وتنظر إليها الأنظار كلحمة معروضة. أيهما أكرم: المرأة المصونة أم المرأة السلعة؟<br/>4- التكريم الكامل: قال النبي ﷺ: «اسْتَوْصُوا بِالنِّسَاءِ خَيْرًا» (رواه البخاري، رقم 3331، ومسلم، رقم 1468). وقال: «الْجَنَّةُ تَحْتَ أَقْدَامِ الْأُمَّهَاتِ» (رواه النسائي وابن ماجه وصححه الألباني). أين الاضطهاد في دين يجعل الجنة عند قدمي الأم؟</p><p><strong>الشرح المختصر:</strong><br/>العدل ليس المساواة المطلقة. الرجل والمرأة مختلفان في الخلقة والمسؤوليات، فوجب أن يختلفا في بعض الأحكام. هذا هو العدل. الرجل مكلف بالإنفاق والجهاد والمسؤولية، فوجب أن يكون له نصيب أكبر في الميراث غالباً لأنه سيصرف. وتأمل: قبل الإسلام كانت المرأة تورث وتُدفن حية. الإسلام جاء فجعلها وارثة مالكة حرة مصونة. أين الاضطهاد؟</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>\"أختي المسلمة ترث نصف أخيها، لكنه هو الذي سيدفع مهر زوجته، وينفق على بيته، ويساعد أبويه. أما هي فمالها لها وحدها، لا تصرف منه شيئاً. أيهما الغني الحقيقي؟ والحجاب، أليس هو الذي يميز المرأة المحترمة عن الممثلة التي يستمتع بها الجميع؟ الإسلام كرّم المرأة، لا تخلط بين التكريم والاضطهاد!\"</p><p><strong>الفائدة التربوية:</strong><br/>أيها الشاب: كُن رجلاً بحق، أنفق على أهلك، احترم النساء، ولا تكن سبباً في ضياع حياء امرأة. أيتها الفتاة: اعتزي بحجابك وحيائك، فأنت جوهرة غالية.</p>"
    },

      "title": "الشبهة الثامنة: \"الحدود الإسلامية وحشية وهمجية (قطع اليد، الرجم)\"",
      "content": "<p><strong>الشبهة:</strong><br/>يقول الحداثيون: \"قطع يد السارق، ورجم الزاني، هذه أحكام همجية لا تتناسب مع العصر الحديث. كيف تقطعون يد إنسان بسبب سرقة؟\"</p><p><strong>الرد بالدليل:</strong><br/>1- الرحمة الحقيقية: قال الله: ﴿وَلَكُمْ فِي الْقِصَاصِ حَيَاةٌ يَا أُولِي الْأَلْبَابِ﴾ [البقرة: 179]. العقوبات الرادعة تحمي المجتمع، فمن يظن أنه سيقطع يده لن يسرق، وبالتالي تحفظ أموال الناس وأعراضهم.<br/>2- شروط صارمة جداً: قطع اليد لا يُقام على أي سرقة، بل لها شروط: أن تكون من حرز، وأن تبلغ نصاباً معيناً، وألا يكون السارق مضطراً (مجاعة مثلاً). في عهد عمر بن الخطاب، أوقف الحد عام المجاعة. إذاً هي عقوبة للص الذي يسرق لا عن حاجة، بل عن فساد.<br/>3- مقارنة بالعقوبات الأخرى: اليوم في بلاد لا تطبق الشرع، ماذا يحدث للسارق؟ يسجن شهوراً، يختلط بمجرمين أكبر، يخرج ليكرر الجريمة. وفي بلاد أخرى، يُقتل المساجين أو يُغتصبون. أيهما أرحم: قطع يد سارق، أم ضياع مجتمع بأكمله في بحر من السرقة والفساد؟<br/>4- تطبيق نادر جداً: هذه الحدود تُقام في أضيق الظروف، والنبي ﷺ قال: «ادْرَءُوا الْحُدُودَ عَنِ الْمُسْلِمِينَ مَا اسْتَطَعْتُمْ» (رواه الترمذي، رقم 1424، وحسنه). المقصود هو الردع قبل التطبيق. انظر إلى السعودية مثلاً، كم مرة طُبق حد السرقة في السنة؟ أعداد قليلة جداً، لكنها ردعت الملايين، فصار الأمن فيها مضرب المثل.</p><p><strong>الشرح المختصر:</strong><br/>الرحمة ليست في ترك المجرم يسرق ويقتل، بل في ردعه ليحيا المجتمع آمناً. هل الأرحم هو الجراح الذي يقطع عضواً فاسداً لينقذ بقية الجسد، أم الذي يتركه فيموت الجسد كله؟ الحدود كالجراحة المؤلمة، تنقذ المجتمع من مرض الجريمة.</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>\"لو كان عندك دواء مؤلم لكنه يعالج مرضاً قاتلاً، أتعطي المريض أم تشفق عليه من الألم فيموت؟ الحدود دواء للمجتمع. ثم إنها لا تطبق إلا بشروط دقيقة جداً، وفي أضيق الحالات. والنبي ﷺ أمرنا بأن ندرأ الحدود بالشبهات. هذه العقوبات قليلة جداً في التطبيق، لكنها كثيرة جداً في الردع والأثر.\"</p><p><strong>الفائدة التربوية:</strong><br/>تعلم أن تنظر إلى الصورة الكاملة، لا إلى الجزء وحده. الإسلام نظام متكامل، لا يفهم حدوده إلا من فهم قلوب أهله وعدلهم.</p>"

      "title": "الشبهة التاسعة: \"لماذا يسمح الإسلام بضرب الزوجة؟\"",
      "content": "<p><strong>الشبهة:</strong><br/>يقول أعداء الإسلام: \"القرآن يدعو إلى ضرب الزوجات في قوله: ﴿وَاضْرِبُوهُنَّ﴾ [النساء: 34]، وهذا عنف ضد المرأة.\"</p><p><strong>الرد بالدليل:</strong><br/>1- السياق كله رحمة: بدأ الله بالنصيحة: ﴿فَعِظُوهُنَّ﴾، ثم بالهجر في المضجع: ﴿وَاهْجُرُوهُنَّ فِي الْمَضَاجِعِ﴾، ثم قال: ﴿وَاضْرِبُوهُنَّ﴾. أي أن الضرب هو المرحلة الثالثة والأخيرة.<br/>2- الضرب المذكور مفسر بالسنة: قال النبي ﷺ في حجة الوداع: «فَاضْرِبُوهُنَّ ضَرْبًا غَيْرَ مُبَرِّحٍ» (رواه مسلم، رقم 1218). أي ضرباً لا يكسر عظماً ولا يشين جارحة ولا يدمي. إنه ضرب خفيف للتأديب، كالضرب بفرشاة السواك، لا للانتقام أو التعذيب.<br/>3- هذا في حالة النشوز (الخيانة الزوجية أو التمرد على الحقوق). ليس ضرباً يومياً، بل علاج لحالة شاذة.<br/>4- النبي ﷺ نفسه لم يضرب امرأة قط. قال: «خِيَارُكُمْ خِيَارُكُمْ لِنِسَائِهِمْ» (رواه الترمذي، رقم 1162، وصححه). وهو القدوة.</p><p><strong>الشرح المختصر:</strong><br/>الضرب هنا هو آخر علاج لحماية الأسرة من الانهيار، وهو ضرب رمزي خفيف جداً، ليس إيذاء. القوانين الوضعية اليوم تعاقب الزوجة الناشز بإجراءات قضائية طويلة، والإسلام عالج المشكلة بسرعة في البيت. لكن انظر: كم أسرة تنهار اليوم، وكم زوجة تُعَنَّف في بلاد لا تعرف هذا التأديب الرمزي المنضبط؟ كم من امرأة تُقتل بلا رحمة في بلاد الغرب على يد زوجها؟ الإسلام أعطى علاجاً وقائياً خفيفاً قبل الانفجار.</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>\"الضرب في القرآن هو ضرب بالسواك، غير مبرح ولا مؤذٍ، وهو آخر حل بعد الوعظ والهجر، وفي حالة خاصة هي النشوز. هل تعلم أن النبي ﷺ الذي هو أسوتنا لم يضرب امرأة قط؟ هذه الآية وضعت ضوابط صارمة للضرب الذي كان في الجاهلية مبرحاً وقتلاً، فجاء الإسلام وقيده بحدود الرحمة. إنها حماية للمرأة لا إيذاء لها.\"</p><p><strong>الفائدة التربوية:</strong><br/>إذا كبرت وتزوجت، فكن رحيماً بزوجتك. الضرب رخصة علاجية في أضيق الحدود، والأفضل تركه. تذكر قول النبي: \"خياركم خياركم لنسائهم\".</p>"

      "content": "<p><strong>الشبهة:</strong><br/>يقول الملحد: \"إذا كان الله رحيماً عادلاً قديراً، فلماذا يخلق الأمراض والزلازل والفقر والحروب؟ ولماذا يموت الأطفال جوعاً؟ ألا يستطيع منع هذا؟\"</p><p><strong>الرد بالدليل:</strong><br/>1- الحياة دار اختبار وابتلاء: قال تعالى: ﴿الَّذِي خَلَقَ الْمَوْتَ وَالْحَيَاةَ لِيَبْلُوَكُمْ أَيُّكُمْ أَحْسَنُ عَمَلًا﴾ [الملك: 2]. الابتلاء هو سبب وجودنا.<br/>2- الشرور نسبية: ما تراه شراً قد يكون فيه خير لا تعلمه. قال تعالى: ﴿وَعَسَىٰ أَنْ تَكْرَهُوا شَيْئًا وَهُوَ خَيْرٌ لَكُمْ ۖ وَعَسَىٰ أَنْ تُحِبُّوا شَيْئًا وَهُوَ شَرٌّ لَكُمْ ۗ وَاللَّهُ يَعْلَمُ وَأَنْتُمْ لَا تَعْلَمُونَ﴾ [البقرة: 216].<br/>3- الشرور تذكرنا بالآخرة: لولا الألم لما عرفنا قيمة الصحة، ولولا الموت لما شعرنا بقيمة الحياة، ولولا الظلم لما اشتقنا إلى العدل المطلق في الآخرة. المصائب تدفع الناس إلى التوبة والرجوع إلى الله.<br/>4- حرية الإنسان: كثير من الشرور هي من صنع الإنسان نفسه (الحروب، التلوث). الله أعطانا حرية الاختيار، ومعها المسؤولية.</p><p><strong>الشرح المختصر:</strong><br/>لو أن الله خلقنا بلا ألم ولا معاناة ولا موت، لكنا في جنة. لكن الجنة هي دار الجزاء، والدنيا هي دار الاختبار. المعاناة تصنع الأبطال. الذهب يُصهر بالنار ليصفو. أنت في اختبار: هل ستصبر وتشكر أم ستكفر؟ الطفل الذي يموت، وأمه التي تبتلى، لهما في الآخرة أجر عظيم. الله حكيم لا يخلق الشر المحض، بل كل ما يخلقه له حكمة، حتى لو خفيت علينا.</p><p><strong>النموذج التطبيقي (كيف ترد؟):</strong><br/>\"لو لم يكن هناك ألم، لما ذهب أحد إلى الطبيب! لولا الجوع، ما زرع أحد ولا عمل. المصاعب هي محرك الحياة. والله وعد أن من مات مظلوماً أو مريضاً فله الجنة. أليس هذا عدلاً؟ الشرور التي يسببها البشر هي دليل على أن الله أعطانا حرية، ولو سلب حريتنا لقلنا: لماذا جبرتنا؟ الله حكيم.\"</p><p><strong>الفائدة التربوية:</strong><br/>إذا أصابتك مصيبة، فلا تقل: \"لماذا يا رب؟\" بل قل: \"اللهم أجرني في مصيبتي واخلفني خيراً منها\". تذكر أن هذا الابتلاء يرفع درجتك في الجنة.</p>"

      "title": "الدرس الثاني: عيني في الشاشة (فقه غض البصر الرقمي)",
      "content": "<p><strong>الفقرة الأساسية:</strong> غض البصر ليس فقط في الشارع، بل هو في الشاشة أشد خطراً وأكثر وقوعاً. صور المحرمات، ومقاطع الفيديو الفاتنة، وحتى بعض الإعلانات، كلها تمر أمام عينك وأنت تتصفح. والعين هي نافذة القلب، فإذا نظرت إلى الحرام، دخلت سهام إبليس إلى قلبك.</p><p><strong>الدليل:</strong> قال تعالى: ﴿قُلْ لِلْمُؤْمِنِينَ يَغُضُّوا مِنْ أَبْصَارِهِمْ وَيَحْفَظُوا فُرُوجَهُمْ ۚ ذَٰلِكَ أَزْكَىٰ لَهُمْ﴾ [النور: 30].<br/>وقال النبي ﷺ: «النَّظْرَةُ سَهْمٌ مَسْمُومٌ مِنْ سِهَامِ إِبْلِيسَ، فَمَنْ تَرَكَهَا مَخَافَتِي أَبْدَلْتُهُ إِيمَانًا يَجِدُ حَلاَوَتَهُ فِي قَلْبِهِ» (رواه الحاكم وحسنه الألباني).</p><p><strong>الشرح المختصر:</strong> عندما تفتح هاتفك، فأنت تدخل سوقاً مفتوحاً. بضاعة الشيطان معروضة على كل رف. ولكنك تستطيع أن تغلق عينيك عن الحرام. كيف؟ إذا ظهرت لك صورة محرمة فجأة، فاصرف بصرك فوراً وأغلق الصفحة، ولا تقل: \"مجرد نظرة\". تذكر أن الله يراك وأنت تتصفح، وأن الملكين يكتبان كل ما تفعله. الشجاع هو من يخاف الله ويغلق الحرام.</p><p><strong>النموذج التطبيقي (مهمة هذا الأسبوع):</strong><br/>1- امسح من جهازك أي تطبيق أو لعبة تعرض صوراً محرمة أو فاتنة.<br/>2- إذا كنت تشاهد مقطعاً وفيه موسيقى أو مناظر محرمة، فأوقفه فوراً واخرج منه.<br/>3- إذا كان لا بد من استخدام الانترنت، فاجعل عينك تنظر إلى المحتوى النافع فقط، كأنك تسير في شارع وتنظر إلى الطريق، لا إلى المارة.</p><p><strong>الفائدة التربوية:</strong> غض البصر الرقمي يجعل قلبك نقياً، وصلاتك أخشع. جرب لمدة أسبوع أن تغض بصرك عن كل محرم في هاتفك، وستشعر بحلاوة الإيمان في قلبك، وستكره الحرام.</p>"
    },

      "title": "الدرس الثالث: أذني وقلبي (فقه الموسيقى والغناء الرقمي)",
      "content": "<p><strong>الفقرة الأساسية:</strong> الموسيقى والغناء الفاسد يحيطان بنا في كل مكان على الانترنت. والإسلام لم يحرم علينا اللهو، بل أباح لنا الطيبات. ولكن حرم علينا ما يفسد القلب ويشغله عن ذكر الله، ويدعو إلى الرذيلة. هناك بدائل كثيرة نظيفة: الأناشيد الهادفة، والقرآن بصوت جميل، والبودكاست العلمي والتربوي.</p><p><strong>الدليل:</strong> قال تعالى: ﴿وَمِنَ النَّاسِ مَنْ يَشْتَرِي لَهْوَ الْحَدِيثِ لِيُضِلَّ عَنْ سَبِيلِ اللَّهِ بِغَيْرِ عِلْمٍ وَيَتَّخِذَهَا هُزُوًا﴾ [لقمان: 6]. قال كثير من المفسرين: \"لهو الحديث\" هو الغناء.<br/>وقال النبي ﷺ: «لَيَكُونَنَّ مِنْ أُمَّتِي أَقْوَامٌ يَسْتَحِلُّونَ الْحِرَ وَالْحَرِيرَ وَالْخَمْرَ وَالْمَعَازِفَ» (رواه البخاري، رقم 5590). والمعازف هي آلات الموسيقى.</p><p><strong>الشرح المختصر:</strong> الغناء الذي يدعو للفحشاء، أو يصوّر الحرام، أو يشغلك عن الصلاة، هو حرام. أما الأناشيد التي ليس فيها موسيقى، والتي تحمل كلمات طيبة عن الأخلاق والشجاعة وحب الله، فهي حلال وبديل رائع. تدرب على تذوق القرآن بصوت جميل، فهو ألذ موسيقى للقلب. والموسيقى في الخلفية وأنت تدرس أو تعمل، تمنعك من التركيز، وتجعل كلام الله غريباً عن أذنك.</p><p><strong>النموذج التطبيقي (مهمة هذا الأسبوع):</strong> هذا الأسبوع، احذف كل أغاني الهاتف. استبدلها بـ:<br/>1- قائمة تشغيل للقرآن (صوت الشيخ الذي تحبه).<br/>2- قائمة أناشيد بدون موسيقى (مثل أناشيد \"كن فضولياً\"، \"أنا البطل\" ونحوها).<br/>3- ثلاثة بودكاستات نافعة (علمية أو قصصية).<br/>لاحظ الفرق في مزاجك وخشوعك في الصلاة.</p><p><strong>الفائدة التربوية:</strong> سمعك نعمة. الله سيسألك: فيمَ استخدمت سمعك؟ فلتجعل سمعك يسمع ما يحبه الله. الأذن تعتاد ما تسمعه، فإذا عودتها القرآن أحبته، وإذا عودتها الغناء الفاسد أدمنته. اختر لنفسك الأفضل.</p>"
    },

      "title": "الدرس الرابع: لساني الرقمي (فقه التعليقات والتواصل الاجتماعي)",
      "content": "<p><strong>الفقرة الأساسية:</strong> عندما تكتب تعليقاً أو تشارك منشوراً أو تنشر مقطعاً، فأنت تتكلم بلسانك الرقمي. وهذا اللسان له أحكام شرعية تماماً مثل لسانك في الحقيقة. الغيبة محرمة، والنميمة محرمة، والكذب محرم، سواء قلتها بفمك أو كتبتها بأناملك على الشاشة. والتنمر الإلكتروني هو من الكبائر.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «وَهَلْ يَكُبُّ النَّاسَ فِي النَّارِ عَلَى وُجُوهِهِمْ إِلَّا حَصَائِدُ أَلْسِنَتِهِمْ؟» (رواه الترمذي، رقم 2616، وصححه الألباني). وهذا يشمل اللسان الناطق واللسان الكاتب.<br/>وقال ﷺ: «مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الْآخِرِ، فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ» (رواه البخاري، رقم 6018، ومسلم، رقم 47). و\"يقول\" تشمل الكتابة.</p><p><strong>الشرح المختصر:</strong> كم من شاب دخل النار بسبب تعليق كتبه! كم من فتنة انتشرت بسبب منشور! كم من شخص تأذى وتألم بسبب تنمر إلكتروني! قبل أن تكتب أي تعليق، اسأل نفسك: هل هذا الكلام يرضي الله؟ هل هو خير؟ هل سأندم عليه يوم القيامة؟ إذا كان لا، فامسحه فوراً ولا تنشره. الرد على الشبهات بالحكمة مطلوب، والسب والشتم والاستهزاء حرام.</p><p><strong>النموذج التطبيقي (مهمة هذا الأسبوع):</strong><br/>1- لا تشارك أي منشور قبل أن تتأكد من صحته (فلا تنشر الإشاعات).<br/>2- لا تكتب تعليقاً فيه سخرية من شخص، ولو كان مخطئاً. انصح سراً أو بلطف.<br/>3- إذا وجدت مجموعة فيها غيبة أو سب، فاخرج منها.<br/>4- استخدم خاصية \"المراسلة الخاصة\" للنصيحة، لا العلن الفاضح.</p><p><strong>الفائدة التربوية:</strong> اجعل بصمتك الرقمية كلها خيراً. كلما فتح شخص صفحتك أو قرأ تعليقاتك، وجد ذكراً لله، أو علماً نافعاً، أو كلمة طيبة. فأنت بذلك تدعو إلى الله وأنت جالس في مكانك.</p>"
    },

      "title": "الدرس الخامس: من تتابع؟ (فقه القدوة الرقمية)",
      "content": "<p><strong>الفقرة الأساسية:</strong> في عصر الشاشات، صار \"المؤثرون\" و\"المشاهير\" هم قدوة كثير من الشباب. ولكن هل كل مشهور يستحق أن يكون قدوة؟ إن كنت تتابع شخصاً يجعلك تحب الدنيا وتكره الآخرة، أو يجرئك على المعصية، فهو صديق سوء رقمي. أما إن كنت تتابع عالماً أو داعية أو شاباً صالحاً، فهو رفيق خير.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «الْمَرْءُ عَلَى دِينِ خَلِيلِهِ، فَلْيَنْظُرْ أَحَدُكُمْ مَنْ يُخَالِلُ» (رواه أبو داود، رقم 4833، والترمذي، رقم 2378، وحسنه الألباني). والخليل قد يكون من العالم الرقمي أيضاً.<br/>وقال تعالى: ﴿وَاصْبِرْ نَفْسَكَ مَعَ الَّذِينَ يَدْعُونَ رَبَّهُمْ بِالْغَدَاةِ وَالْعَشِيِّ يُرِيدُونَ وَجْهَهُ ۖ وَلَا تَعْدُ عَيْنَاكَ عَنْهُمْ﴾ [الكهف: 28].</p><p><strong>الشرح المختصر:</strong> من تتابعهم يؤثرون في طريقة كلامك، ولبسك، وأفكارك، ودينك. إذا كان من تتابعهم يستهزئون بالدين، أو ينشرون الفحش، أو يعيشون حياة الترف والبذخ واللامبالاة، فإنك ستتأثر بهم لا محالة. أما إذا تابعت الشباب الصالحين، وأهل العلم، وحفظة القرآن، فستجد نفسك ترتقي وتعلو. قاعدة ذهبية: اسأل نفسك عن كل مؤثر تتابعه: هل يذكرني بالله؟ هل يعلمني خيراً؟ إن كان الجواب لا، فاحذفه.</p><p><strong>النموذج التطبيقي (مهمة هذا الأسبوع):</strong> افتح قائمة المتابَعين لديك. احذف كل من ينشر الحرام أو التفاهة. أضف بدلاً منهم:<br/>1- قناة لحافظ قرآن صغير.<br/>2- قناة لطالب علم مبسط (مثل قناة \"أطفال وبنات\" أو قنوات العلماء الموثوقة).<br/>3- قناة علمية (مخترعون، فضاء، تاريخ إسلامي).<br/>ستجد أن صفحتك أصبحت نظيفة ونافعة.</p><p><strong>الفائدة التربوية:</strong> أنت قائد نفسك. لا تكن تابعاً لأي أحد. اختر قدوتك بذكاء، واجعل قدوتك الأولى محمداً ﷺ، ثم أصحابه، ثم الصالحين. المؤثرون على الانترنت زائلون، والعلم النافع هو الباقي.</p>"
    },
    {
      "title": "الدرس السادس: لا للإدمان الرقمي",
      "content": "<p><strong>الفقرة الأساسية:</strong> الإدمان على الألعاب أو الفيديوهات أو التواصل الاجتماعي مرض خطير. يجعلك تفقد السيطرة على وقتك، ويهز شخصيتك، ويصيبك بالقلق والتوتر. والإسلام يأمرنا بالاعتدال في كل شيء، ويحرم علينا أن نضر بأنفسنا.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «إِنَّ لِنَفْسِكَ عَلَيْكَ حَقًّا، وَلِأَهْلِكَ عَلَيْكَ حَقًّا، وَلِزَوْرِكَ عَلَيْكَ حَقًّا، فَأَعْطِ كُلَّ ذِي حَقٍّ حَقَّهُ» (رواه البخاري، رقم 1968). حق نفسك ألا ترهقها وتضيع عمرها.<br/>وقال تعالى: ﴿وَكُلُوا وَاشْرَبُوا وَلَا تُسْرِفُوا ۚ إِنَّهُ لَا يُحِبُّ الْمُسْرِفِينَ﴾ [الأعراف: 31]. والإسراف يكون في الأكل والشرب، وفي قتل الوقت أيضاً.</p><p><strong>الشرح المختصر:</strong> علامات الإدمان الرقمي: أن تمسك هاتفك أول ما تستيقظ وآخر ما تنام. أن تغضب إذا قُطعت عنك الانترنت. أن تكذب بشأن عدد الساعات التي تقضيها. أن تتأخر صلاتك أو تهمل دراستك. هذا هو الخطر بعينه. العلاج: التدرج في التخفيف. لا تقطع فجأة، بل قلل نصف ساعة يومياً. ضع قوانين في بيتك: لا هواتف على مائدة الطعام، ولا هواتف قبل النوم بنصف ساعة.</p><p><strong>النموذج التطبيقي (مهمة هذا الأسبوع):</strong> ضع خطة \"الثلاث مناطق الحمراء\" في منزلك:<br/>المنطقة الحمراء (ممنوع الهاتف): في دورة المياه، وعلى مائدة الطعام، وفي غرفة النوم بعد الساعة 9 مساءً.<br/>المنطقة الصفراء (مسموح بوقت محدد): الألعاب (ساعة واحدة يومياً)، الفيديوهات (ساعة واحدة يومياً).<br/>المنطقة الخضراء (مفتوح دائماً): تطبيقات القرآن والأذكار، وتطبيقات التعلم.</p><p><strong>الفائدة التربوية:</strong> الحرية ليست أن تفعل ما تريد، بل أن تتحكم في نفسك. إذا استطعت أن تتحكم في وقت الشاشة، فأنت إنسان قوي. وإذا تحكمت الشاشة فيك، فأنت ضعيف. كن قوياً.</p>"
    },
    {
      "title": "الدرس السابع: ألعابي الإلكترونية (بين الحلال والحرام)",
      "content": "<p><strong>الفقرة الأساسية:</strong> الألعاب الإلكترونية من حيث الأصل مباحة، فهي لهو ولعب. لكن فيها محاذير كثيرة: فبعضها يعلم العنف، وبعضها فيه قمار، وبعضها فيه موسيقى وصور عارية، وبعضها فيه استهزاء بالدين. والأخطر: أنها إذا شغلتك عن الصلاة أو الواجبات صارت حراماً.</p><p><strong>الدليل:</strong> قال النبي ﷺ: «كُلُّ لَهْوٍ يَلْهُو بِهِ الْمُسْلِمُ فَهُوَ بَاطِلٌ، إِلَّا رَمْيَهُ بِقَوْسِهِ، وَتَأْدِيبَهُ فَرَسَهُ، وَمُلَاعَبَتَهُ أَهْلَهُ» (رواه الترمذي، رقم 1637، وحسنه). واللعب المباح ما كان نافعاً للبدن أو العقل، وليس فيه محرم.<br/>وقال ﷺ: «مَنْ لَعِبَ بِالنَّرْدَشِيرِ فَكَأَنَّمَا غَمَسَ يَدَهُ فِي لَحْمِ خِنْزِيرٍ وَدَمِهِ» (رواه مسلم، رقم 2260). والنردشير هو لعبة قمار قديمة، والعلة هي القمار. فكل لعبة فيها قمار (حتى لو كانت نقاطاً وهمية تراهن بها) فهي محرمة.</p><p><strong>الشرح المختصر:</strong> اسأل نفسك عن أي لعبة:<br/>- هل فيها موسيقى محرمة؟ (أطفئ صوت الموسيقى).<br/>- هل فيها صور نساء عاريات أو كاشفات؟ (احذف اللعبة).<br/>- هل فيها سب وقذف وشتائم تعلم لساني؟ (احذفها).<br/>- هل تشغلني عن الصلاة؟ (ضع منبهاً، وإذا لم تستطع التحكم، فاحذفها).<br/>- هل ألعبها أكثر من ساعتين يومياً؟ (قلل إلى ساعة).</p><p><strong>النموذج التطبيقي (مهمة هذا الأسبوع):</strong> استبدل لعبة واحدة عنيفة أو غير أخلاقية بلعبة مفيدة:<br/>1- لعبة ألغاز وذكاء.<br/>2- لعبة رياضية (فيفا بدون شعارات محرمة، بشرط الوقت).<br/>3- لعبة تعلم لغة جديدة.<br/>4- لعبة برمجة للأطفال.<br/>اجعل الألعاب وسيلة لتنمية مهارة، لا لقتل الوقت فقط.</p><p><strong>الفائدة التربوية:</strong> لا بأس باللعب والترفيه، ولكن بضوابط. المؤمن القوي يحول أي شيء إلى نفع. حتى لعبك، اجعله يطور عقلك أو بدنك.</p>"

                currentSection = 'course';

                return '<p>لا يوجد محتوى لهذا الدرس.</p>';
            }
            return sections.map(sec => {
                const iconMap = {
                    'paragraph': 'fa-paragraph',
                    'quote': 'fa-quote-right',
                    'explanation': 'fa-lightbulb',
                    'application': 'fa-check-circle',
                    'benefit': 'fa-gem'
                };
                const labelMap = {
                    'paragraph': '📌 الفقرة الأساسية',
                    'quote': '📖 الدليل',
                    'explanation': '💡 الشرح',
                    'application': '✅ النموذج التطبيقي',
                    'benefit': '🎯 الفائدة'
                };
                const icon = iconMap[sec.type] || 'fa-paragraph';
                const label = labelMap[sec.type] || 'محتوى';
                let extra = '';
                if (sec.type === 'quote' && sec.source) {
                    extra = `<span class="source">— ${sec.source}</span>`;
                }
                // معالجة المحتوى: قد يحتوي على عناوين فرعية أو قوائم
                let contentHtml = sec.content;
                // إذا كان المحتوى لا يحتوي على وسوم قوائم نضعه داخل <p>
                if (!contentHtml.includes('<ul') && !contentHtml.includes('<ol')) {
                    contentHtml = `<p>${contentHtml}</p>`;
                }
                return `
                    <div class="section-block ${sec.type}">
                        <div class="section-label">
                            <i class="fas ${icon}"></i> ${label}
                        </div>
                        ${contentHtml}
                        ${extra}
                    </div>
                `;
            }).join('');
        }

        // ================================================================
        // 6. دوال مساعدة للتقدم
        // ================================================================
        function getProgressKey(courseId, lessonIndex) {
            return `hosoonaliman_progress_${courseId}_${lessonIndex}`;
        }

        function isLessonDone(courseId, lessonIndex) {
            return localStorage.getItem(getProgressKey(courseId, lessonIndex)) === 'true';
        }

        function getCourseProgress(courseId) {
            const course = courses.find(c => c.id === courseId);
            if (!course) return 0;
            let done = 0;
            course.lessons.forEach((_, idx) => {
                if (isLessonDone(courseId, idx)) done++;
            });
            return Math.round((done / course.lessons.length) * 100);
        }

        function updateProgressIndicators() {
            // التحديث يتم تلقائياً عبر إعادة الرندر
        }

        // ================================================================
        // 7. أحداث الدروس
        // ================================================================
        function toggleLesson(header) {
            const body = header.nextElementSibling;
            body.classList.toggle('active');
            const icon = header.querySelector('.lesson-meta i');
            if (body.classList.contains('active')) {
                icon.classList.replace('fa-chevron-down', 'fa-chevron-up');
            } else {
                icon.classList.replace('fa-chevron-up', 'fa-chevron-down');
            }
        }

        function completeLesson(event, courseId, lessonIndex, courseTitle, lessonTitle) {
            event.stopPropagation();
            if (isLessonDone(courseId, lessonIndex)) {
                showCheerMessage("🎯", "الدرس مكتمل بالفعل!", "أنت ممتاز! واصل التقدم.");
                return;
            }
            localStorage.setItem(getProgressKey(courseId, lessonIndex), 'true');

            // تحديث الواجهة الحالية: نعيد تحميل تفاصيل الكراسة لتحديث كل شيء
            navigateTo('course', { courseId, lessonIndex });
            // عرض التشجيع
            const msgs = [
                "أحسنت يا بطل! 🌟",
                "ممتاز! استمر! 💪",
                "رائع! أنت تتقدم بثبات 🚀",
                "ما شاء الله عليك! 👏",
                "أنت بطل حصون الإيمان! 🏆"
            ];
            const msg = msgs[Math.floor(Math.random() * msgs.length)];
            showCheerMessage("🌟🌟🌟🌟🌟", msg, "لقد أتممت الدرس بنجاح، واصل رحلتك الإيمانية!");
        }

        function showCheerMessage(stars, title, desc) {
            document.querySelector('#cheerModal .stars').textContent = stars;
            document.getElementById('cheerMessage').textContent = title;
            document.querySelector('#cheerModal p').textContent = desc;
            document.getElementById('cheerModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('cheerModal').style.display = 'none';
        }
        document.getElementById('cheerModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ================================================================
        // 8. ربط الأحداث بعد التحميل
        // ================================================================

            // الأحداث مربوطة مباشرة في الـ HTML
        }

        // ================================================================
        // 9. الهامبرغر
        // ================================================================
        document.getElementById('hamburger').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // ================================================================
        // 10. التحميل الأولي
        // ================================================================
        window.onload = function() {
            navigateTo('home');
        };
    </script>
